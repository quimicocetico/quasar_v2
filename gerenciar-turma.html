<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Turma — Quasar</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    .glass { background: rgba(17,24,39,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
    .card-hover:hover { border-color: rgba(0,240,255,0.3); box-shadow: 0 0 20px rgba(0,240,255,0.1); }
  </style>
</head>
<body class="bg-[#0A0F1C] text-white font-['Outfit'] min-h-screen">

  <main class="max-w-6xl mx-auto px-4 py-12">
    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-12">
      <div>
        <a href="/dashboard-professor.html" class="text-sm text-gray-500 hover:text-[#00F0FF] flex items-center gap-2 mb-2 transition-colors">
          <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar ao Painel
        </a>
        <div class="flex items-center gap-4">
          <div id="turma-avatar-display" class="w-16 h-16 rounded-2xl bg-gradient-to-br from-[#00F0FF] to-[#7000FF] flex items-center justify-center text-3xl shadow-lg shadow-[#00F0FF]/20">
            <i data-lucide="users" class="w-8 h-8 text-white"></i>
          </div>
          <div>
            <h1 id="turma-nome-display" class="text-4xl font-black tracking-tight">Carregando...</h1>
            <p id="escola-nome-display" class="text-gray-400 font-medium"></p>
          </div>
        </div>
      </div>
      
      <div class="flex gap-3">
        <button onclick="abrirModalConfig()" class="px-5 py-2.5 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all flex items-center gap-2 font-bold">
          <i data-lucide="settings" class="w-4 h-4 text-gray-400"></i> Editar Dados
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Coluna Alunos -->
      <div class="lg:col-span-2 space-y-6">
        <div class="glass rounded-3xl p-8">
          <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold flex items-center gap-3">
              <i data-lucide="graduation-cap" class="text-[#00F0FF]"></i> Estudantes
            </h2>
            <button onclick="abrirModalAluno()" class="px-4 py-2 bg-[#00F0FF] text-[#0A0F1C] rounded-xl font-bold hover:scale-105 transition-all text-sm">
              + Matricular Aluno
            </button>
          </div>
          
          <div id="lista-alunos" class="space-y-3">
            <div class="text-center py-10 opacity-30 italic">Nenhum aluno matriculado.</div>
          </div>
        </div>
      </div>

      <!-- Coluna Taça e Info -->
      <div class="space-y-6">
        <div class="glass rounded-3xl p-8 border-t-4 border-t-[#00F0FF]/50">
          <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
            <i data-lucide="trophy" class="text-[#FFD700]"></i> Pontuação de Casa
          </h2>
          <div class="space-y-4">
            <div>
              <label class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-1 block">Casa Vinculada</label>
              <select id="select-casa" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-[#00F0FF] transition-all">
                <option value="">Selecione uma casa...</option>
              </select>
            </div>
            <button onclick="abrirModalPontos()" class="w-full py-4 bg-gradient-to-r from-[#00F0FF]/20 to-[#7000FF]/20 border border-[#00F0FF]/30 text-[#00F0FF] rounded-2xl font-black hover:bg-[#00F0FF]/30 transition-all">
              ATRIBUIR PONTOS
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal Config Turma -->
  <div id="modal-config" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm hidden">
    <div class="max-w-md w-full glass rounded-3xl p-8 shadow-2xl">
      <h2 class="text-2xl font-bold mb-6">Configurações da Turma</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Nome da Turma</label>
          <input type="text" id="edit-turma-nome" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-[#00F0FF] outline-none transition-all">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Avatar (Emoji)</label>
          <input type="text" id="edit-turma-avatar" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-[#00F0FF] outline-none transition-all" placeholder="Ex: 🧪">
        </div>
        <div class="flex gap-3">
          <button onclick="fecharModais()" class="flex-1 py-3 bg-white/5 rounded-xl">Cancelar</button>
          <button id="btn-save-config" class="flex-1 py-3 bg-[#00F0FF] text-[#0A0F1C] font-bold rounded-xl">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Matricular Aluno -->
  <div id="modal-aluno" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm hidden">
    <div class="max-w-md w-full glass rounded-3xl p-8 shadow-2xl">
      <h2 class="text-2xl font-bold mb-2">Matricular Estudante</h2>
      <p class="text-gray-400 mb-6">Insira o e-mail institucional do aluno para adicioná-lo à turma.</p>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">E-mail</label>
          <input type="email" id="novo-aluno-email" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-[#00F0FF] outline-none transition-all" placeholder="exemplo@estudante.rn.gov.br">
        </div>
        <div class="flex gap-3">
          <button onclick="fecharModais()" class="flex-1 py-3 bg-white/5 rounded-xl">Cancelar</button>
          <button id="btn-save-aluno" class="flex-1 py-3 bg-[#00F0FF] text-[#0A0F1C] font-bold rounded-xl">Matricular</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Pontos -->
  <div id="modal-pontos" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm hidden">
    <div class="max-w-md w-full glass rounded-3xl p-8 shadow-2xl">
      <h2 class="text-2xl font-bold mb-6">Atribuir Pontos</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Pontuação</label>
          <input type="number" id="input-pontos" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-[#00F0FF] outline-none transition-all" value="10">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Motivo</label>
          <input type="text" id="input-motivo" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-[#00F0FF] outline-none transition-all" placeholder="Ex: Participação em aula">
        </div>
        <div class="flex gap-3 pt-2">
          <button onclick="fecharModais()" class="flex-1 py-3 bg-white/5 rounded-xl">Cancelar</button>
          <button id="btn-confirmar-pontos" class="flex-1 py-3 bg-gradient-to-r from-[#FFD700] to-[#FFA500] text-black font-bold rounded-xl">Confirmar</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
  <script type="module">
    import { requireAuth } from "./_shared/gatekeeper.js";
    import { db, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, getDocs, query, where, addDoc, serverTimestamp } from "./_shared/db.js";

    const params = new URLSearchParams(window.location.search);
    const escolaId = params.get('escola');
    const turmaId = params.get('turma');

    if (!escolaId || !turmaId) window.location.href = "/dashboard-professor.html";

    requireAuth(async (user) => {
      await inicializarPagina();
      setupEvents(user);
    });

    async function inicializarPagina() {
      try {
        // 1. Dados Escola/Turma
        const turmaRef = doc(db, "escolas", escolaId, "turmas", turmaId);
        const turmaSnap = await getDoc(turmaRef);
        const escolaRef = doc(db, "escolas", escolaId);
        const escolaSnap = await getDoc(escolaRef);

        if (!turmaSnap.exists()) return window.location.href = "/dashboard-professor.html";

        const turmaData = turmaSnap.data();
        document.getElementById('turma-nome-display').textContent = turmaData.nome;
        document.getElementById('escola-nome-display').textContent = escolaSnap.data().nome;
        document.getElementById('edit-turma-nome').value = turmaData.nome;
        document.getElementById('edit-turma-avatar').value = turmaData.avatar || '👥';
        
        if (turmaData.avatar) {
          document.getElementById('turma-avatar-display').innerHTML = `<span class="text-3xl">${turmaData.avatar}</span>`;
        }

        // 2. Alunos
        await carregarAlunos();

        // 3. Casas
        await carregarCasas();

        lucide.createIcons();
      } catch (e) { console.error(e); }
    }

    async function carregarAlunos() {
      const lista = document.getElementById('lista-alunos');
      const q = query(collection(db, "matriculas"), where("turma_id", "==", turmaId), where("escola_id", "==", escolaId));
      const snap = await getDocs(q);

      if (snap.empty) {
        lista.innerHTML = '<div class="text-center py-10 opacity-30 italic">Nenhum aluno matriculado.</div>';
        return;
      }

      lista.innerHTML = snap.docs.map(d => {
        const aluno = d.data();
        const dateStr = aluno.created_at ? new Date(aluno.created_at.toDate()).toLocaleDateString() : 'N/A';
        return `
          <div class="p-4 bg-white/5 border border-white/5 rounded-2xl flex items-center justify-between hover:bg-white/10 transition-colors">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center">
                <i data-lucide="user" class="w-5 h-5 text-gray-500"></i>
              </div>
              <div>
                <div class="font-bold text-gray-200">${aluno.email}</div>
                <div class="text-xs text-gray-500">Matriculado em ${dateStr}</div>
              </div>
            </div>
            <button onclick="removerAluno('${d.id}')" class="p-2 text-red-500/50 hover:text-red-500 hover:bg-red-500/10 rounded-lg transition-all">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    async function carregarCasas() {
      const select = document.getElementById('select-casa');
      // Temporada fixa para teste
      const q = collection(db, "taca_casas", "temp_2024_1", "casas");
      const snap = await getDocs(q);
      snap.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.id;
        opt.textContent = d.data().nome;
        opt.className = "bg-[#1e293b]";
        select.appendChild(opt);
      });
    }

    function setupEvents(user) {
      // Salvar Config
      document.getElementById('btn-save-config').onclick = async () => {
        const novoNome = document.getElementById('edit-turma-nome').value.trim();
        const novoAvatar = document.getElementById('edit-turma-avatar').value.trim();
        if (!novoNome) return;
        
        await updateDoc(doc(db, "escolas", escolaId, "turmas", turmaId), { 
          nome: novoNome,
          avatar: novoAvatar
        });
        location.reload();
      };

      // Matricular Aluno
      document.getElementById('btn-save-aluno').onclick = async () => {
        const email = document.getElementById('novo-aluno-email').value.trim();
        if (!email) return;
        
        await addDoc(collection(db, "matriculas"), {
          email,
          escola_id: escolaId,
          turma_id: turmaId,
          papel: "aluno",
          created_at: serverTimestamp()
        });
        fecharModais();
        await carregarAlunos();
      };

      // Atribuir Pontos
      document.getElementById('btn-confirmar-pontos').onclick = async () => {
        const casaId = document.getElementById('select-casa').value;
        const pontos = parseInt(document.getElementById('input-pontos').value);
        const motivo = document.getElementById('input-motivo').value.trim();

        if (!casaId || isNaN(pontos)) return alert("Selecione a casa e a pontuação.");

        const casaRef = doc(db, "taca_casas", "temp_2024_1", "casas", casaId);
        const snap = await getDoc(casaRef);
        await updateDoc(casaRef, { pontos_total: (snap.data().pontos_total || 0) + pontos });
        
        await addDoc(collection(db, "taca_casas", "temp_2024_1", "casas", casaId, "eventos"), {
          pontos, motivo, professor_uid: user.uid, created_at: serverTimestamp()
        });

        alert("Pontos atribuídos!");
        fecharModais();
      };
    }

    window.abrirModalConfig = () => document.getElementById('modal-config').classList.remove('hidden');
    window.abrirModalAluno = () => document.getElementById('modal-aluno').classList.remove('hidden');
    window.abrirModalPontos = () => document.getElementById('modal-pontos').classList.remove('hidden');
    window.fecharModais = () => {
      ['modal-config', 'modal-aluno', 'modal-pontos'].forEach(id => document.getElementById(id).classList.add('hidden'));
    };

    window.removerAluno = async (matriculaId) => {
      if (confirm("Deseja remover este aluno da turma?")) {
        try {
          await deleteDoc(doc(db, "matriculas", matriculaId));
          await carregarAlunos();
        } catch (e) {
          console.error(e);
          alert("Erro ao remover aluno.");
        }
      }
    };
  </script>
</body>
</html>
