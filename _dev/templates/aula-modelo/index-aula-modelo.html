<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
    TÍTULO: lido pelo robô gerar-catalogo.js para nomear a aula no catálogo.
    O script extrai o texto antes do " —". Mantenha o formato.
    O título real vem do JSON — este é só fallback para o robô.
  -->
  <title>Nome da Aula — Plataforma Quasar</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    .glass-panel { background: rgba(15, 23, 42, 0.7); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .btn-neon {
      background: linear-gradient(135deg, #00F0FF, #7000FF);
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-neon:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-neon:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-[#0A0F1C] text-white" style="font-family: 'Outfit', sans-serif;">

  <main class="container mx-auto px-4 py-6 flex-grow max-w-6xl relative z-10">

    <!-- Cabeçalho — preenchido pelo JS -->
    <section id="aula-header" class="glass-panel rounded-2xl border border-white/10 p-8 mb-8 mt-8 shadow-2xl sticky top-16 z-20">
      <div class="flex flex-col gap-3">
        <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
          <div>
            <p id="aula-meta" class="text-sm uppercase tracking-[0.3em] text-[#00F0FF]/70">Carregando...</p>
            <h1 id="aula-titulo" class="text-4xl sm:text-5xl font-bold text-white mt-2"></h1>
          </div>
          <p id="aula-descricao" class="text-sm text-gray-300 max-w-xl"></p>
        </div>
        <nav id="tabs-nav" class="flex flex-wrap gap-2 mt-6"></nav>
      </div>
    </section>

    <!-- Tabs de conteúdo — geradas pelo JS -->
    <div id="tabs-container"></div>

    <!-- Exercícios -->
    <section id="exercicios" class="tab-content">
      <div class="glass-panel rounded-2xl border border-white/10 p-8 mb-6">
        <h2 class="text-3xl font-bold text-white mb-2">Avaliação Final</h2>
        <p class="mb-6 text-gray-300">Permitida apenas uma submissão por aluno.</p>

        <div id="loader" class="text-center py-10">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#00F0FF] mx-auto"></div>
          <p class="mt-4 text-[#00F0FF] font-semibold">Verificando dados...</p>
        </div>

        <div id="already-answered" class="hidden glass-panel rounded-2xl border border-[#00F0FF]/30 p-8 text-center bg-[#08101f]">
          <strong class="font-bold text-xl block mb-2 text-[#00F0FF]">Atividade Concluída!</strong>
          <span id="answered-msg" class="block text-gray-300">Você já enviou as respostas desta atividade.</span>
        </div>

        <form id="quiz-form" class="hidden space-y-6">
          <div class="glass-panel rounded-2xl border border-white/10 p-4 bg-[#0f172a]">
            <p class="text-sm text-gray-300">Logado como: <span id="user-email-display" class="font-bold text-white"></span></p>
          </div>
          <div id="questoes-container" class="space-y-6"></div>
          <div class="pt-6 border-t border-white/10">
            <button type="submit" id="btn-submit" class="w-full btn-neon text-white font-bold py-4 rounded-xl">
              Enviar Respostas Definitivas
            </button>
            <p id="submit-msg" class="text-center mt-4 text-sm"></p>
          </div>
        </form>
      </div>
    </section>

  </main>

  <!-- ── Lógica de tabs ──────────────────────────────────────────────── -->
  <script>
    function openTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => {
        el.classList.remove('text-[#00F0FF]', 'border-b-2', 'border-[#00F0FF]');
        el.classList.add('text-gray-300', 'opacity-80');
      });
      document.getElementById(tabId).classList.add('active');
      const btn = document.getElementById('btn-' + tabId);
      if (btn) {
        btn.classList.remove('text-gray-300', 'opacity-80');
        btn.classList.add('text-[#00F0FF]', 'border-b-2', 'border-[#00F0FF]');
      }
    }
  </script>

  <!-- ── Renderizador + Quiz ─────────────────────────────────────────── -->
  <script type="module">
    import { auth, db, enviarAtividade } from '/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // ── 1. Carrega o JSON da mesma pasta ────────────────────────────────
    const jsonPath = new URL('./aula.json', window.location.href).href;
    let AULA = null;

    async function init() {
      try {
        const res = await fetch(jsonPath);
        if (!res.ok) throw new Error(`JSON não encontrado: ${jsonPath}`);
        AULA = await res.json();
        renderAula();
        initQuiz();
      } catch (err) {
        console.error(err);
        document.getElementById('aula-meta').textContent = 'Erro ao carregar conteúdo.';
      }
    }

    // ── 2. Renderiza cabeçalho e tabs ───────────────────────────────────
    function renderAula() {
      document.title = `${AULA.titulo} — Plataforma Quasar`;
      document.getElementById('aula-meta').textContent = `${AULA.materia} • ${AULA.serie}`;
      document.getElementById('aula-titulo').textContent = AULA.titulo;
      document.getElementById('aula-descricao').textContent = AULA.descricao;

      const nav = document.getElementById('tabs-nav');
      const container = document.getElementById('tabs-container');

      AULA.tabs.forEach((tab, i) => {
        // Botão de tab
        const btn = document.createElement('button');
        btn.id = 'btn-' + tab.id;
        btn.className = 'tab-btn px-5 py-3 rounded-full text-sm font-semibold border border-white/10 transition-colors hover:bg-white/5 focus:outline-none ' +
          (i === 0 ? 'text-[#00F0FF] border-b-2 border-[#00F0FF]' : 'text-gray-300 opacity-80');
        btn.textContent = tab.label;
        btn.onclick = () => openTab(tab.id);
        nav.appendChild(btn);

        // Seção da tab
        const section = document.createElement('section');
        section.id = tab.id;
        section.className = 'tab-content' + (i === 0 ? ' active' : '');
        section.innerHTML = `
          <div class="glass-panel rounded-2xl border border-white/10 p-8 mb-6">
            <h2 class="text-3xl font-bold text-white mb-6">${tab.label}</h2>
            ${tab.secoes.map(renderSecao).join('')}
          </div>`;
        container.appendChild(section);
      });

      // Botão de exercícios
      const btnEx = document.createElement('button');
      btnEx.id = 'btn-exercicios';
      btnEx.className = 'tab-btn px-5 py-3 rounded-full text-sm font-semibold border border-white/10 transition-colors hover:bg-white/5 focus:outline-none text-gray-300 opacity-80';
      btnEx.textContent = 'Exercícios';
      btnEx.onclick = () => openTab('exercicios');
      nav.appendChild(btnEx);
    }

    // ── 3. Renderiza cada tipo de seção ─────────────────────────────────
    function renderSecao(s) {
      switch (s.tipo) {
        case 'texto':
          return `<p class="text-gray-300 mb-6 text-lg leading-relaxed">${s.conteudo}</p>`;

        case 'imagem':
          return `
            <div class="glass-panel rounded-2xl border border-white/10 p-4 mb-6 bg-[#0f172a] text-center">
              <img src="${s.src}" alt="${s.legenda || ''}"
                class="max-w-full mx-auto rounded-xl"
                onerror="this.parentElement.innerHTML='<span class=\\'text-gray-500 text-sm\\'>Imagem não disponível: ${s.legenda || s.src}</span>'">
              ${s.legenda ? `<p class="text-gray-500 text-xs mt-2">${s.legenda}</p>` : ''}
            </div>`;

        case 'video':
          return `
            <div class="rounded-2xl border border-white/10 bg-[#0f172a] overflow-hidden mb-6">
              <div class="relative" style="padding-top: 56.25%;">
                <iframe src="${s.src}" class="absolute inset-0 w-full h-full"
                  frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowfullscreen loading="lazy"></iframe>
              </div>
              ${s.legenda ? `<p class="text-gray-500 text-xs p-3">${s.legenda}</p>` : ''}
            </div>`;

        case 'aprofundamento':
          return `
            <details class="glass-panel rounded-2xl border border-white/10 p-4 mb-6 bg-[#0f172a]">
              <summary class="flex justify-between items-center cursor-pointer text-white font-semibold">
                <span>🔍 Aprofundamento: ${s.titulo}</span>
                <span class="text-[#00F0FF]">+</span>
              </summary>
              <div class="mt-3 text-gray-300 text-sm leading-relaxed">${s.conteudo}</div>
            </details>`;

        case 'curiosidade':
          return `
            <div class="glass-panel rounded-2xl border border-white/10 p-6 mb-6 bg-[#0f172a]">
              <h3 class="font-bold text-[#00F0FF] mb-2">💡 Curiosidade do Cotidiano: ${s.titulo}</h3>
              <p class="text-gray-300 text-sm leading-relaxed">${s.conteudo}</p>
            </div>`;

        default:
          return `<p class="text-red-400 text-sm mb-4">Tipo de seção desconhecido: "${s.tipo}"</p>`;
      }
    }

    // ── 4. Sorteia e renderiza questões ─────────────────────────────────
    function sortear(arr, n) {
      return [...arr].sort(() => Math.random() - 0.5).slice(0, n);
    }

    function renderQuestoes() {
      const cfg = AULA.quiz;
      const objetivas  = sortear(cfg.questoes.filter(q => q.tipo === 'objetiva'),  cfg.objetivas_exibidas);
      const discursivas = sortear(cfg.questoes.filter(q => q.tipo === 'discursiva'), cfg.discursivas_exibidas);
      const selecionadas = [...objetivas, ...discursivas];

      const container = document.getElementById('questoes-container');
      container.innerHTML = '';

      let num = 1;

      if (objetivas.length) {
        container.insertAdjacentHTML('beforeend',
          '<h3 class="text-xl font-bold text-white border-l-4 border-[#00F0FF] pl-3">Questões Objetivas</h3>');
        objetivas.forEach(q => {
          container.insertAdjacentHTML('beforeend', renderObjetiva(q, num++));
        });
      }

      if (discursivas.length) {
        container.insertAdjacentHTML('beforeend',
          '<h3 class="text-xl font-bold text-white border-l-4 border-[#00F0FF] pl-3 mt-4">Questões Discursivas</h3>');
        discursivas.forEach(q => {
          container.insertAdjacentHTML('beforeend', renderDiscursiva(q, num++));
        });
      }
    }

    function renderObjetiva(q, num) {
      const alts = q.alternativas.map(a => `
        <label class="flex items-center gap-3 p-3 rounded-xl border border-white/10 bg-[#09101a] hover:bg-white/5 transition-colors cursor-pointer">
          <input type="radio" name="${q.id}" value="${a.letra}" class="text-[#00F0FF] focus:ring-[#00F0FF]" required>
          <span class="text-gray-300">${a.letra}) ${a.texto}</span>
        </label>`).join('');
      return `
        <div class="glass-panel p-6 rounded-2xl border border-white/10 hover:border-[#00F0FF]/30 transition-colors">
          <p class="font-semibold mb-4 text-white">${num}. ${q.enunciado}</p>
          <div class="space-y-3">${alts}</div>
        </div>`;
    }

    function renderDiscursiva(q, num) {
      return `
        <div class="glass-panel p-6 rounded-2xl border border-white/10 flex flex-col gap-3 bg-[#0f172a]">
          <label class="font-semibold text-white" for="${q.id}">${num}. ${q.enunciado}</label>
          <textarea id="${q.id}" name="${q.id}" rows="3"
            class="w-full border border-white/10 rounded-xl bg-[#09101a] text-gray-200 p-3 focus:ring-[#00F0FF] focus:border-[#00F0FF] focus:outline-none"
            required></textarea>
        </div>`;
    }

    // ── 5. Lógica de auth + envio ────────────────────────────────────────
    function initQuiz() {
      const loader          = document.getElementById('loader');
      const quizForm        = document.getElementById('quiz-form');
      const alreadyAnswered = document.getElementById('already-answered');
      const answeredMsg     = document.getElementById('answered-msg');
      const userEmailEl     = document.getElementById('user-email-display');
      const btnSubmit       = document.getElementById('btn-submit');
      const submitMsg       = document.getElementById('submit-msg');

      onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        if (userEmailEl) userEmailEl.textContent = user.email;

        try {
          const q = query(
            collection(db, "atividades_alunos"),
            where("id_atividade", "==", AULA.id_atividade),
            where("aluno_email",  "==", user.email)
          );
          const snap = await getDocs(q);
          loader.classList.add('hidden');

          if (!snap.empty) {
            alreadyAnswered.classList.remove('hidden');
          } else {
            renderQuestoes(); // sorteia só quando o formulário vai ser exibido
            quizForm.classList.remove('hidden');
          }
        } catch (err) {
          console.error(err);
          loader.classList.add('hidden');
          submitMsg.textContent = "Erro de conexão. Atualize a página.";
          submitMsg.className = "text-center font-bold mt-4 text-red-500";
        }
      });

      quizForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        btnSubmit.disabled = true;
        btnSubmit.textContent = "Enviando... Aguarde...";

        const respostas = Object.fromEntries(new FormData(quizForm));

        try {
          await enviarAtividade(AULA.id_atividade, respostas);
          quizForm.classList.add('hidden');
          answeredMsg.textContent = "Suas respostas foram salvas com sucesso!";
          alreadyAnswered.classList.remove('hidden');
        } catch (err) {
          console.error(err);
          submitMsg.textContent = "Erro ao enviar: " + err.message;
          submitMsg.className = "text-center font-bold mt-4 text-red-500";
          btnSubmit.disabled = false;
          btnSubmit.textContent = "Tentar Novamente";
        }
      });
    }

    init();
  </script>

  <!-- Gatekeeper — SEMPRE o último script -->
  <script type="module" src="/app.js"></script>
</body>
</html>
