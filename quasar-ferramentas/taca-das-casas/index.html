<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taça das Casas — Quasar</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    .glass { background: rgba(17,24,39,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
    .gold-glow { box-shadow: 0 0 30px rgba(255,215,0,0.2); }
    .rank-1 { background: linear-gradient(135deg, rgba(255,215,0,0.1) 0%, rgba(255,215,0,0.05) 100%); border-color: rgba(255,215,0,0.3); }
    body { background: radial-gradient(circle at top right, #1a1b3a 0%, #0A0F1C 100%); }
  </style>
</head>
<body class="text-white font-['Outfit'] min-h-screen">
  <main class="max-w-4xl mx-auto px-4 py-16">
    <header class="text-center mb-16">
      <div class="inline-flex p-4 rounded-full bg-yellow-500/10 border border-yellow-500/20 mb-6 gold-glow">
        <i data-lucide="trophy" class="w-12 h-12 text-yellow-400"></i>
      </div>
      <h1 class="text-5xl font-black tracking-tighter mb-4 uppercase">Taça das Casas</h1>
      <p class="text-gray-400 max-w-md mx-auto">Acompanhe a pontuação das casas em tempo real e lute pela glória da sua turma!</p>
    </header>

    <div id="ranking-list" class="space-y-4">
      <div class="flex justify-center items-center py-20 opacity-30">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-white"></div>
      </div>
    </div>
  </main>

  <script type="module">
    import { initRanking } from "./main.js";

    const list = document.getElementById("ranking-list");

    initRanking((casas) => {
      list.innerHTML = casas.map((casa, i) => {
        const isTop3 = i < 3;
        const rankColors = ['text-yellow-400', 'text-slate-300', 'text-amber-600'];
        const rankIcons = ['crown', 'medal', 'medal'];
        
        return `
          <div class="glass rounded-3xl p-6 flex items-center justify-between group hover:scale-[1.02] transition-all duration-300 ${i === 0 ? 'rank-1' : ''}">
            <div class="flex items-center gap-6">
              <div class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center font-black text-xl ${isTop3 ? rankColors[i] : 'text-gray-500'}">
                ${isTop3 ? `<i data-lucide="${rankIcons[i]}" class="w-6 h-6"></i>` : (i + 1)}
              </div>
              <div>
                <div class="text-2xl font-bold tracking-tight">${casa.nome}</div>
                <div class="text-xs text-gray-500 uppercase tracking-widest font-semibold">${casa.descricao || 'Casa Lendária'}</div>
              </div>
            </div>
            <div class="text-right">
              <div class="text-3xl font-black text-[#00F0FF]">${casa.pontos_total}</div>
              <div class="text-[10px] text-gray-500 uppercase font-bold tracking-tighter">Pontos Arcanos</div>
            </div>
          </div>
        `;
      }).join('');
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
