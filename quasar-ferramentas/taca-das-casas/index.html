<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taça das Casas — Quasar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ranking-container">
    <h1 style="text-align: center; margin-bottom: 40px;">🏆 Taça das Casas</h1>
    <div id="ranking-list">
      <div style="text-align: center; opacity: 0.5;">Carregando ranking...</div>
    </div>
  </div>

  <script type="module">
    import { initRanking } from "./main.js";

    const list = document.getElementById("ranking-list");

    initRanking((casas) => {
      list.innerHTML = casas.map((casa, i) => `
        <div class="casa-card">
          <div class="casa-info">
            <div class="casa-nome">${i + 1}º ${casa.nome}</div>
          </div>
          <div class="casa-pontos">${casa.pontos_total} pts</div>
        </div>
      `).join('');
    });
  </script>
</body>
</html>
