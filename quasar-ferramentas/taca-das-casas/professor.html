<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle das Casas — Quasar</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../global.css">
  <script type="module" src="/app.js"></script>
</head>
<body class="hero-bg text-white font-['Outfit'] min-h-screen pb-20">
  <div class="geo-grid"></div>

  <main class="max-w-3xl mx-auto px-4 py-12 space-y-12 stagger-in">
    <header class="text-center space-y-4">
      <div class="inline-flex p-4 rounded-2xl bg-cyan-500/10 border border-cyan-500/20 mb-2">
        <i data-lucide="shield-check" class="w-8 h-8 text-cyan-400"></i>
      </div>
      <h1 class="text-3xl md:text-5xl font-black tracking-tighter uppercase italic">Painel do Mestre</h1>
      <p class="text-gray-500 text-[10px] font-black uppercase tracking-[0.2em]">Gestão Rápida da Taça das Casas</p>
    </header>

    <div id="ranking-list" class="space-y-4">
      <div class="flex items-center justify-center py-20">
        <div class="w-8 h-8 border-4 border-cyan-500/20 border-t-cyan-500 rounded-full animate-spin"></div>
      </div>
    </div>
  </main>

  <script type="module">
    import { initRanking, atribuirPontos } from "./main.js";

    const list = document.getElementById("ranking-list");
    const params = new URLSearchParams(window.location.search);
    const temporadaId = params.get("temporada") || "temp_2024_1";

    initRanking((data) => {
      const casas = data.casas || data; // Compatibilidade com retorno do main.js
      list.innerHTML = casas.map((casa) => `
        <div class="glass-card p-6 flex flex-col md:flex-row items-center justify-between gap-6 group">
          <div class="flex items-center gap-5">
            <div class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center font-black text-xl text-cyan-500 group-hover:border-cyan-500/50 transition-all">
              ${casa.nome.charAt(0)}
            </div>
            <div>
              <div class="text-lg font-black uppercase tracking-tight">${casa.nome}</div>
              <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">${casa.pontos_total} Pontos Atuais</div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <button class="px-4 py-2 bg-emerald-500/10 hover:bg-emerald-500 text-emerald-500 hover:text-black rounded-xl border border-emerald-500/20 font-black text-xs transition-all" onclick="addPts('${casa.id}', 10)">+10</button>
            <button class="px-4 py-2 bg-emerald-500/10 hover:bg-emerald-500 text-emerald-500 hover:text-black rounded-xl border border-emerald-500/20 font-black text-xs transition-all" onclick="addPts('${casa.id}', 50)">+50</button>
            <button class="px-4 py-2 bg-rose-500/10 hover:bg-rose-500 text-rose-500 hover:text-black rounded-xl border border-rose-500/20 font-black text-xs transition-all" onclick="addPts('${casa.id}', -10)">-10</button>
          </div>
        </div>
      `).join('');
      if (window.lucide) lucide.createIcons();
    });

    window.addPts = async (casaId, pts) => {
      const motivo = prompt("Qual o feito heroico (ou deslize)?");
      if (!motivo) return;
      
      const success = await atribuirPontos(temporadaId, casaId, pts, motivo);
      if (success) {
        // Recarregar após 500ms
        setTimeout(() => window.location.reload(), 500);
      }
    };
    
    if (window.lucide) lucide.createIcons();
  </script>
</body>
</html>
