<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline Quest</title>
  <!-- 1. Tailwind -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
 
  <!-- 2. Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADING -->
<div class="screen" id="loadingScreen">
  <div style="text-align:center">
    <div class="loader-ring" style="margin:0 auto"></div>
    <div class="loader-text">Carregando Desafio...</div>
  </div>
</div>

<!-- LOGIN -->
<div class="screen hidden" id="loginScreen">
  <div class="login-box">
    <span class="login-sword">⚔️</span>
    <div class="login-title">Timeline Quest</div>
    <div class="login-subtitle">Uma jornada pela história</div>
    <div id="challengeTitle">Carregando desafio...</div>
    <div class="input-group">
      <label>⚔️ Guerreiro 1</label>
      <input type="text" id="player1Input" placeholder="Nome do primeiro aluno" maxlength="30">
    </div>
    <div class="input-group">
      <label>🛡️ Guerreiro 2</label>
      <input type="text" id="player2Input" placeholder="Nome do segundo aluno" maxlength="30">
    </div>
    <div class="input-group">
      <label>🏫 Turma</label>
      <input type="text" id="turmaInput" placeholder="Nome da turma" maxlength="30">
    </div>
    <div id="noChallengeMsg" style="display:none">⚠️ Nenhum desafio ativo. Aguarde o professor iniciar a atividade.</div>
    <button class="btn-primary" id="startBtn" onclick="startGame()">⚔️ INICIAR MISSÃO</button>
  </div>
</div>

<!-- HEADER -->
<div id="header">
  <div>
    <div id="headerTitle">Timeline Quest</div>
    <div id="duoNames">—</div>
  </div>
  <div class="stats-bar">
    <div class="stat-chip">
      <span class="stat-label">Pontos</span>
      <span class="stat-value" id="scoreDisplay">0</span>
    </div>
    <div class="stat-chip" id="streakChip">
      <span class="stat-label">Sequência</span>
      <span class="stat-value" id="streakDisplay">0</span>
      <div class="streak-dots" id="streakDots">
        <div class="streak-dot" id="dot0"></div>
        <div class="streak-dot" id="dot1"></div>
        <div class="streak-dot" id="dot2"></div>
      </div>
    </div>
    <div class="stat-chip" id="multiplierChip">
      <span class="stat-label">Mult.</span>
      <span class="stat-value" id="multDisplay">×1.0</span>
    </div>
    <div class="progress-ring-wrap" title="Progresso">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle class="progress-ring-bg" cx="22" cy="22" r="18"/>
        <circle class="progress-ring-fill" id="progressRing" cx="22" cy="22" r="18"
          stroke-dasharray="113.1"
          stroke-dashoffset="113.1"/>
      </svg>
      <div class="progress-ring-text" id="progressText">0%</div>
    </div>
  </div>
</div>

<!-- TIMELINE -->
<div id="timelineContainer" style="display:none">
  <div class="tl-line"></div>
  <div id="timelineContent"></div>
</div>

<!-- RANKING BUTTON -->
<button id="rankingBtn" class="visible" onclick="showRanking()" style="display:none">
  🏆 RANKING
</button>

<!-- EVENT DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    <div class="modal-year" id="detailYear"></div>
    <div class="modal-title" id="detailTitle"></div>
    <img class="modal-image" id="detailImage" src="" alt="" style="display:none">
    <div class="modal-content" id="detailContent"></div>
    <button class="btn-quiz" id="detailQuizBtn" onclick="openQuiz()">
      📜 RESPONDER QUESTÃO &nbsp;+10 pts
    </button>
  </div>
</div>

<!-- QUIZ MODAL -->
<div class="modal-overlay" id="quizModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('quizModal')">✕</button>
    <div style="font-family:'Cinzel',serif;font-size:0.7rem;color:var(--secondary);letter-spacing:3px;margin-bottom:16px" id="quizEventLabel"></div>
    <div class="quiz-question" id="quizQuestion"></div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-feedback" id="quizFeedback"></div>
  </div>
</div>

<!-- BURST OVERLAY -->
<div id="burstOverlay">
  <div class="burst-text" id="burstText">📜 DOMÍNIO HISTÓRICO!<br><span style="font-size:0.6em;opacity:0.8">Multiplicador Ativo ×1.5</span></div>
</div>

<!-- RANKING PAGE -->
<div id="rankingPage">
  <div class="ranking-header">
    <div class="ranking-title">🏆 Ranking da Missão</div>
    <div class="ranking-subtitle" id="rankingSubtitle">Placar em tempo real</div>
  </div>
  <div class="ranking-list" id="rankingList"></div>
  <div style="text-align:center;margin-top:24px">
    <button class="btn-back" onclick="hideRanking()">← Voltar à Missão</button>
  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
