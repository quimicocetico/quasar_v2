<!-- index.html -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Inteligente de Estequiometria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../global.css">
</head>
<body>
    <header>
        <h1>Tutor Inteligente de Estequiometria</h1>
    </header>
    <main class="container">
        <section class="area-de-trabalho">
            <h2>Área de Trabalho</h2>
            <label for="equacao">Equação Química:</label>
            <input type="text" id="equacao" placeholder="Ex: 2H2 + O2 → 2H2O">
            <label for="reagente">Reagente:</label>
            <input type="text" id="reagente" placeholder="Ex: H2">
            <label for="produto">Produto:</label>
            <input type="text" id="produto" placeholder="Ex: H2O">
            <button id="calcular">Calcular</button>
            <div id="resultados"></div>
        </section>
        <section class="painel-do-tutor">
            <h2>Painel do Tutor</h2>
            <div class="chat-tutor">
                <p>Olá! Vejo que você quer descobrir a massa de H2O. Qual é o primeiro passo: balancear a equação ou calcular a massa molar?</p>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
