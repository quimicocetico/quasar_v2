<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula — Plataforma Quasar</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body { background-color: #0A0F1C; color: white; }
    .glass-sticky { 
      background: rgba(10, 15, 28, 0.8); 
      backdrop-filter: blur(12px); 
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .deepening-content { transition: max-height 0.3s ease-out; overflow: hidden; }
    .hidden-content { max-height: 0; }
    .show-content { max-height: 2000px; }
  </style>
</head>
<body>

  <div class="h-20"></div>

  <div id="lesson-header" class="sticky top-20 z-40 glass-sticky py-4">
    <div class="max-w-4xl mx-auto px-6">
      <h1 id="aula-titulo" class="text-2xl md:text-3xl font-bold text-white tracking-tight">Carregando...</h1>
      <p id="aula-subtitulo" class="text-cyan-400 text-xs font-mono uppercase tracking-widest mt-1"></p>
      
      <nav id="tabs-nav" class="flex gap-2 mt-6 overflow-x-auto pb-2 no-scrollbar"></nav>
    </div>
  </div>

  <div id="lesson-header" class="sticky top-20 z-40 bg-[#0A0F1C]/90 backdrop-blur-lg py-4 border-b border-white/5">
  <div class="max-w-4xl mx-auto px-6">
    <h1 id="aula-titulo" class="text-2xl md:text-3xl font-bold text-white tracking-tight"></h1>
    <p id="aula-subtitulo" class="text-cyan-400 text-xs font-mono uppercase mt-1 tracking-widest"></p>
    
    <nav id="tabs-nav" class="flex gap-2 mt-6 overflow-x-auto pb-2 no-scrollbar"></nav>
  </div>
</div>

<main class="max-w-4xl mx-auto p-6 pb-20">
  <div id="tabs-content-container"></div>
  
  <div id="tab-exercicios" class="hidden animate-in fade-in duration-500">
      <div class="bg-blue-500/10 p-4 rounded-xl border border-blue-500/20 mb-8 flex items-center gap-3 text-blue-400 text-sm">
          <i data-lucide="info"></i>
          <span>Responda as 10 questões sorteadas para esta aula. Você só pode enviar uma vez.</span>
      </div>
      <form id="quiz-form" class="space-y-4"></form>
      
      <div id="quiz-result" class="hidden bg-slate-900/50 p-8 mt-12 rounded-2xl border border-cyan-500/20"></div>
  </div>
</main>

  <script type="module" src="/app.js"></script>
  <script type="module">
    import { iniciarAula } from '/scripts/motor-de-aula.js';
    window.addEventListener('load', iniciarAula);
  </script>
</body>
</html>
