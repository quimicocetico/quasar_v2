<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding — Quasar</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.3); border-radius: 10px; }
    .checkbox-card:checked + label { border-color: #00F0FF; background: rgba(0,240,255,0.1); }
    
    /* Correção do contraste nas opções do select */
    select option { background-color: #1a1b3a; color: white; }
    select option:hover { background-color: #00F0FF; color: #0A0F1C; }
  </style>
</head>
<body class="bg-[#0A0F1C] text-white font-['Outfit'] min-h-screen flex items-center justify-center p-4 md:p-8">

  <div class="w-full max-w-md bg-white/5 border border-white/10 backdrop-blur-xl rounded-3xl p-6 md:p-10 shadow-2xl">
    <div id="onboarding-professor" class="hidden">
      <h1 class="text-2xl md:text-3xl font-bold mb-2">Bem-vindo, Professor!</h1>
      <p class="text-gray-400 mb-6 md:mb-8 text-sm md:text-base">Vamos configurar seu ambiente de ensino.</p>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Selecione sua Escola</label>
          <select id="escola-id" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-[#00F0FF] outline-none transition-all appearance-none">
            <option value="" class="bg-[#1e293b]">Escolha uma escola...</option>
            <option value="NEW" class="bg-[#1e293b] font-bold text-[#00F0FF]">+ Cadastrar Nova Escola</option>
          </select>
        </div>

        <div id="escola-nova-container" class="hidden animate-in fade-in slide-in-from-top-2 duration-300">
          <label class="block text-sm font-medium text-gray-300 mb-1">Nome da Nova Escola</label>
          <input type="text" id="escola-nome-novo" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-[#00F0FF] outline-none transition-all" placeholder="Ex: Escola Estadual Quasar">
        </div>
        
        <div id="turmas-container" class="hidden space-y-4">
          <label class="block text-sm font-medium text-gray-300 mb-1">Suas Turmas (selecione as existentes ou crie novas)</label>
          
          <div id="lista-turmas-existentes" class="space-y-2 max-h-48 overflow-y-auto pr-2 custom-scrollbar">
            <!-- Turmas serão injetadas aqui -->
          </div>

          <div id="turma-nova-container" class="hidden animate-in fade-in slide-in-from-top-2 duration-300">
            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Nome da Nova Turma</label>
            <input type="text" id="turma-nome-novo" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-[#00F0FF] outline-none transition-all" placeholder="Ex: 9º Ano A">
          </div>

          <button type="button" id="btn-toggle-nova-turma" class="text-xs text-[#00F0FF] font-medium hover:underline flex items-center gap-1">
            <i data-lucide="plus" class="w-3 h-3"></i> Adicionar outra turma nova
          </button>
        </div>

        <button id="btn-finalizar-professor" class="w-full bg-gradient-to-r from-[#00F0FF] to-[#7000FF] text-white font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(0,240,255,0.3)] hover:scale-[1.02] transition-all">
          Começar a Ensinar
        </button>
      </div>
    </div>

    <div id="onboarding-aluno" class="hidden">
      <h1 class="text-3xl font-bold mb-2">Olá, Estudante!</h1>
      <p class="text-gray-400 mb-8" id="aluno-msg">Verificando sua matrícula...</p>
      
      <div id="aluno-status-loading" class="flex justify-center py-8">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#00F0FF]"></div>
      </div>

      <div id="aluno-status-erro" class="hidden text-center">
        <div class="bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-xl mb-6">
          Nenhuma matrícula encontrada para seu e-mail institucional.
        </div>
        <p class="text-sm text-gray-400 mb-6">Peça ao seu professor para cadastrar seu e-mail na turma.</p>
        <button onclick="location.reload()" class="text-[#00F0FF] font-medium hover:underline">Tentar novamente</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth } from "./_shared/gatekeeper.js";
    import { db, doc, getDoc, setDoc, updateDoc, collection, addDoc, getDocs, query, where, serverTimestamp } from "./_shared/db.js";

    requireAuth(async (user) => {
      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);
      const profile = userSnap.data();

      if (profile.papel === 'professor') {
        document.getElementById('onboarding-professor').classList.remove('hidden');
        setupProfessor(user, userRef);
      } else {
        document.getElementById('onboarding-aluno').classList.remove('hidden');
        setupAluno(user, userRef);
      }
    });

    async function setupProfessor(user, userRef) {
      const btn = document.getElementById('btn-finalizar-professor');
      const escolaSelect = document.getElementById('escola-id');
      const escolaNovaDiv = document.getElementById('escola-nova-container');
      const escolaNomeInput = document.getElementById('escola-nome-novo');
      
      const turmasContainer = document.getElementById('turmas-container');
      const listaTurmas = document.getElementById('lista-turmas-existentes');
      const turmaNovaDiv = document.getElementById('turma-nova-container');
      const turmaNovoNomeInput = document.getElementById('turma-nome-novo');
      const btnToggleNova = document.getElementById('btn-toggle-nova-turma');

      // 1. Carregar escolas existentes
      try {
        const schoolsSnap = await getDocs(collection(db, "escolas"));
        schoolsSnap.forEach(doc => {
          const opt = document.createElement('option');
          opt.value = doc.id;
          opt.textContent = doc.data().nome;
          escolaSelect.appendChild(opt);
        });
      } catch (e) { console.error("Erro ao carregar escolas:", e); }

      // Mostrar/Ocultar campo de nova escola e carregar turmas
      escolaSelect.onchange = async () => {
        const escolaId = escolaSelect.value;
        listaTurmas.innerHTML = '';
        turmasContainer.classList.add('hidden');
        turmaNovaDiv.classList.add('hidden');
        
        if (!escolaId) return;

        if (escolaId === 'NEW') {
          escolaNovaDiv.classList.remove('hidden');
          escolaNomeInput.focus();
          turmasContainer.classList.remove('hidden');
          turmaNovaDiv.classList.remove('hidden');
        } else {
          escolaNovaDiv.classList.add('hidden');
          turmasContainer.classList.remove('hidden');
          
          // Buscar turmas da escola selecionada
          try {
            const turmasSnap = await getDocs(collection(db, "escolas", escolaId, "turmas"));
            if (!turmasSnap.empty) {
              turmasSnap.forEach(tDoc => {
                const tData = tDoc.data();
                const div = document.createElement('div');
                div.innerHTML = `
                  <div class="relative">
                    <input type="checkbox" id="t-${tDoc.id}" value="${tDoc.id}" class="checkbox-card hidden">
                    <label for="t-${tDoc.id}" class="flex items-center justify-between p-3 bg-white/5 border border-white/10 rounded-xl cursor-pointer hover:bg-white/10 transition-all">
                      <span class="font-medium text-sm">${tData.nome}</span>
                      <i data-lucide="check" class="w-4 h-4 text-[#00F0FF] opacity-0 check-icon transition-all"></i>
                    </label>
                  </div>
                `;
                listaTurmas.appendChild(div);
              });
              if (window.lucide) lucide.createIcons();
              
              // CSS customizado para os cards de checkbox
              const style = document.createElement('style');
              style.textContent = `
                .checkbox-card:checked + label { border-color: #00F0FF; background: rgba(0,240,255,0.1); }
                .checkbox-card:checked + label .check-icon { opacity: 1; }
              `;
              document.head.appendChild(style);
            } else {
              listaTurmas.innerHTML = '<p class="text-gray-500 text-xs italic py-2">Nenhuma turma cadastrada. Crie a primeira abaixo.</p>';
              turmaNovaDiv.classList.remove('hidden');
            }
          } catch (e) { console.error(e); }
        }
      };

      btnToggleNova.onclick = () => {
        turmaNovaDiv.classList.toggle('hidden');
        if (!turmaNovaDiv.classList.contains('hidden')) turmaNovoNomeInput.focus();
      };

      btn.onclick = async () => {
        let escolaId = escolaSelect.value;
        const escolaNovoNome = escolaNomeInput.value.trim();
        const selectedTurmaIds = Array.from(listaTurmas.querySelectorAll('input:checked')).map(i => i.value);
        const turmaNovoNome = turmaNovoNomeInput.value.trim();

        if (!escolaId) return alert("Selecione uma escola.");
        if (escolaId === 'NEW' && !escolaNovoNome) return alert("Informe o nome da nova escola.");
        if (selectedTurmaIds.length === 0 && !turmaNovoNome) return alert("Selecione pelo menos uma turma ou crie uma nova.");

        btn.disabled = true;
        btn.textContent = "Configurando...";

        try {
          // 2. Criar Escola se necessário
          if (escolaId === 'NEW') {
            const escolaRef = await addDoc(collection(db, "escolas"), {
              nome: escolaNovoNome,
              professor_uid: user.uid,
              created_at: serverTimestamp()
            });
            escolaId = escolaRef.id;
          }

          // 3. Vincular Turmas Existentes
          for (const tId of selectedTurmaIds) {
            await updateDoc(doc(db, "escolas", escolaId, "turmas", tId), {
              professor_uid: user.uid
            });
          }

          // 4. Criar Nova Turma se informada
          if (turmaNovoNome) {
            await addDoc(collection(db, "escolas", escolaId, "turmas"), {
              nome: turmaNovoNome,
              professor_uid: user.uid,
              created_at: serverTimestamp()
            });
          }

          // 5. Atualizar Profile
          await setDoc(userRef, { escola_id: escolaId }, { merge: true });

          window.location.href = "/index.html";
        } catch (e) {
          console.error(e);
          alert("Erro ao configurar. Tente novamente.");
          btn.disabled = false;
          btn.textContent = "Começar a Ensinar";
        }
      };
    }

    async function setupAluno(user, userRef) {
      const emailAlvo = user.email.toLowerCase();
      
      try {
        const q = query(collection(db, "matriculas"), where("email", "==", emailAlvo));
        const snap = await getDocs(q);

        if (!snap.empty) {
          const matDoc = snap.docs[0];
          const matData = matDoc.data();
          
          // Vincula e finaliza onboarding
          await updateDoc(userRef, { 
            escola_id: matData.escola_id, 
            turma_id: matData.turma_id 
          });
          await updateDoc(matDoc.ref, { aluno_uid: user.uid });
          
          window.location.href = "/index.html";
        } else {
          document.getElementById('aluno-status-loading').classList.add('hidden');
          document.getElementById('aluno-status-erro').classList.remove('hidden');
          document.getElementById('aluno-msg').textContent = "Nenhuma matrícula encontrada para seu e-mail institucional.";
        }
      } catch (e) {
        console.error(e);
        document.getElementById('aluno-msg').textContent = "Erro ao verificar matrícula. Tente atualizar a página.";
      }
    }
  </script>
</body>
</html>
