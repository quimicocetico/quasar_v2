<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Painel — Quasar</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <script type="module" src="app.js"></script>
</head>

<body class="hero-bg text-white font-['Outfit'] min-h-screen pb-12">
  <div class="geo-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <main class="max-w-xl mx-auto px-4 py-8 space-y-6">

    <!-- Perfil -->
    <header class="flex items-center gap-4 md:gap-5 glass-card p-5 md:p-6 shadow-2xl shadow-cyan-500/10 stagger-in">
      <div class="relative">
        <div id="user-avatar" class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-gradient-to-br from-cyan-400 to-emerald-400 flex items-center justify-center text-3xl md:text-4xl shadow-xl">
          <i data-lucide="user" class="w-8 h-8 md:w-10 md:h-10 text-white"></i>
        </div>
        <div class="absolute -bottom-0.5 -right-0.5 bg-emerald-500 w-4 h-4 md:w-5 md:h-5 rounded-full border-4 border-[#0A0F1C]"></div>
      </div>
      <div class="min-w-0">
        <h1 id="user-nome" class="text-lg md:text-xl font-black tracking-tight leading-none mb-1 truncate">Carregando...</h1>
        <div class="space-y-0.5 opacity-60">
          <p id="user-escola" class="text-[9px] md:text-[10px] uppercase font-black tracking-wider truncate">Escola...</p>
          <p id="user-turma" class="text-cyan-400 text-[9px] md:text-[10px] uppercase font-black tracking-wider truncate">Turma...</p>
        </div>
      </div>
    </header>

    <!-- Minha Casa -->
    <section id="casa-section" class="hidden glass-card p-6 md:p-8 border-t-4 border-t-white/10 overflow-hidden relative stagger-in" style="animation-delay: 0.1s">
      <div class="absolute -right-4 -top-4 opacity-5">
        <i data-lucide="shield" class="w-24 h-24 md:w-32 md:h-32"></i>
      </div>
      <div class="relative z-10 flex justify-between items-center">
        <div>
          <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Minha Casa</h2>
          <p id="casa-nome" class="text-2xl md:text-3xl font-black italic tracking-tighter uppercase">...</p>
          <a href="/quasar-ferramentas/taca-das-casas/index.html" class="inline-flex items-center gap-1 mt-2 text-[9px] font-black text-cyan-400 uppercase hover:underline tracking-widest">
            Ranking Geral <i data-lucide="arrow-up-right" class="w-3 h-3"></i>
          </a>
        </div>
        <div class="text-right">
          <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Saldo Total</p>
          <p id="casa-pontos" class="text-2xl md:text-3xl font-black stat-value">0</p>
        </div>
      </div>
    </section>

    <!-- Minha Turma -->
    <button onclick="abrirModalTurma()"
      class="w-full glass p-6 rounded-[2rem] space-y-4 text-left hover:bg-white/10 transition-all">
      <div class="flex items-center justify-between">
        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Minha Turma</h3>
        <div class="flex items-center gap-2">
          <span id="contagem-colegas" class="text-[10px] bg-white/10 px-2 py-0.5 rounded-full text-gray-400">0
            Alunos</span>
          <i data-lucide="chevron-right" class="w-4 h-4 text-gray-600"></i>
        </div>
      </div>
      <div id="lista-colegas-preview" class="flex -space-x-2 overflow-hidden">
        <!-- Avatares discretos -->
      </div>
    </button>

    <!-- Stats Discretas -->
    <div class="glass p-5 rounded-2xl flex items-center justify-between hidden">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-purple-500/10 rounded-lg flex items-center justify-center">
          <i data-lucide="layers" class="text-purple-400 w-4 h-4"></i>
        </div>
        <span class="text-sm font-bold text-gray-300">Coleção Codex</span>
      </div>
      <span id="count-cartas" class="text-lg font-black text-purple-400">0</span>
    </div>

    <!-- Links Rápidos -->
    <nav class="space-y-3">
      <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-4 mb-2">Acesso Rápido</h3>
      <a href="/index.html"
        class="flex items-center justify-between glass p-5 rounded-2xl hover:bg-white/5 transition-all">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 bg-[#00F0FF]/10 rounded-xl flex items-center justify-center">
            <i data-lucide="layout-grid" class="text-[#00F0FF] w-5 h-5"></i>
          </div>
          <span class="font-bold">Portal de Missões</span>
        </div>
        <i data-lucide="chevron-right" class="text-gray-600"></i>
      </a>
      <a href="/quasar-ferramentas/codex-arcano/index.html"
        class="flex items-center justify-between glass p-5 rounded-2xl hover:bg-white/5 transition-all hidden">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 bg-purple-500/10 rounded-xl flex items-center justify-center">
            <i data-lucide="book-open" class="text-purple-400 w-5 h-5"></i>
          </div>
          <span class="font-bold">Meu Codex</span>
        </div>
        <i data-lucide="chevron-right" class="text-gray-600"></i>
      </a>
      <a href="/quasar-ferramentas/taca-das-casas/index.html"
        class="flex items-center justify-between glass p-5 rounded-2xl hover:bg-white/5 transition-all">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 bg-yellow-500/10 rounded-xl flex items-center justify-center">
            <i data-lucide="trophy" class="text-yellow-500 w-5 h-5"></i>
          </div>
          <span class="font-bold">Taça das Casas</span>
        </div>
        <i data-lucide="chevron-right" class="text-gray-600"></i>
      </a>
    </nav>

  </main>

  <!-- Modal Minha Turma -->
  <div id="modal-turma" class="fixed inset-0 z-[100] hidden flex items-end sm:items-center justify-center p-0 sm:p-4 modal-overlay" onclick="fecharModais()">
    <div class="relative w-full max-w-lg glass-card p-8 md:p-10 shadow-2xl animate-in slide-in-from-bottom sm:zoom-in duration-300" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-10">
        <div class="flex items-center gap-5">
          <div class="w-14 h-14 bg-gradient-to-br from-cyan-500/20 to-emerald-600/20 rounded-2xl flex items-center justify-center border border-cyan-500/30 shadow-lg shadow-cyan-500/10">
            <i data-lucide="users" class="w-7 h-7 text-cyan-400"></i>
          </div>
          <div>
            <h2 class="text-3xl font-black tracking-tight leading-tight">Minha Turma</h2>
            <p id="modal-contagem" class="text-[10px] text-cyan-500 font-black uppercase tracking-[0.2em] mt-1">Sincronizando Colegas...</p>
          </div>
        </div>
        <button onclick="fecharModais()" class="w-12 h-12 flex items-center justify-center hover:bg-white/5 rounded-2xl transition-all border border-transparent hover:border-white/10 group">
          <i data-lucide="x" class="w-6 h-6 text-gray-500 group-hover:text-white transition-colors"></i>
        </button>
      </div>

      <div id="modal-lista-colegas" class="space-y-3 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar">
        <!-- Lista injetada via JS -->
      </div>

      <div class="mt-8 pt-8 border-t border-white/5 flex justify-end">
        <button onclick="fecharModais()" class="px-8 py-4 bg-white/5 hover:bg-white/10 rounded-2xl font-black uppercase text-[10px] tracking-widest text-gray-500 hover:text-white border border-white/5 transition-all">
          Fechar Janela
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth } from "./_shared/gatekeeper.js";
    import { auth } from "./firebase-config.js";
    import { db, doc, getDoc, collection, getDocs, query, where, onSnapshot } from "./_shared/db.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    requireAuth(async (user) => {
      // 1. Dados Básicos do Perfil
      document.getElementById('user-nome').textContent = user.displayName || "Explorador";
      lucide.createIcons();

      // 2. Buscar Dados no Firestore
      try {
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (userSnap.exists()) {
          const profile = userSnap.data();
          if (profile.nome) document.getElementById('user-nome').textContent = profile.nome;

          // Buscar nome da Escola e Turma
          if (profile.escola_id) {
            const escolaSnap = await getDoc(doc(db, "escolas", profile.escola_id));
            if (escolaSnap.exists()) document.getElementById('user-escola').textContent = escolaSnap.data().nome;

            const turmaSnap = await getDoc(doc(db, "escolas", profile.escola_id, "turmas", profile.turma_id));
            if (turmaSnap.exists()) document.getElementById('user-turma').textContent = turmaSnap.data().nome;
          }

          // 3. Buscar Dados da Casa se estiver matriculado
          if (profile.turma_id) {
            // Buscamos a casa vinculada a esta turma na temporada ativa (fixa temp_2024_1 para o MVP)
            const qCasa = query(
              collection(db, "taca_casas", "temp_2024_1", "casas"),
              where("turma_id", "==", profile.turma_id)
            );

            onSnapshot(qCasa, (snap) => {
              if (!snap.empty) {
                const casaData = snap.docs[0].data();
                document.getElementById('casa-section').classList.remove('hidden');
                document.getElementById('casa-nome').textContent = casaData.nome;
                document.getElementById('casa-pontos').textContent = casaData.pontos_total || 0;
              }
            });

            // 4. Buscar Colegas de Turma e Professores
            const qColegas = query(
              collection(db, "matriculas"),
              where("turma_id", "==", profile.turma_id)
            );

            onSnapshot(qColegas, async (snap) => {
              const colegas = snap.docs.map(d => d.data());
              colegas.sort((a, b) => (a.nome || "").localeCompare(b.nome || ""));

              const countText = `${colegas.length} Alunos`;
              document.getElementById('contagem-colegas').textContent = countText;
              document.getElementById('modal-contagem').textContent = countText;

              // Buscar dados dos professores da turma
              const turmaData = (await getDoc(doc(db, "escolas", profile.escola_id, "turmas", profile.turma_id))).data();
              const profsData = [];
              const profsUids = turmaData?.professores || (turmaData?.professor_uid ? [turmaData.professor_uid] : []);

              for (const pUid of profsUids) {
                const pSnap = await getDoc(doc(db, "users", pUid));
                if (pSnap.exists()) profsData.push(pSnap.data());
              }

              // Preview no card (avatares)
              const preview = document.getElementById('lista-colegas-preview');
              preview.innerHTML = colegas.slice(0, 5).map(() => `
                <div class="w-8 h-8 rounded-full bg-gray-800 border-2 border-[#111827] flex items-center justify-center">
                  <i data-lucide="user" class="w-4 h-4 text-gray-600"></i>
                </div>
              `).join('');

              // Lista no Modal
              const modalLista = document.getElementById('modal-lista-colegas');
              modalLista.innerHTML = `
                <div class="mb-6">
                  <h3 class="text-[10px] font-bold text-[#00F0FF] uppercase tracking-widest mb-3 ml-1">Corpo Docente</h3>
                  <div class="space-y-2">
                    ${profsData.map(p => `
                      <div class="flex items-center gap-4 p-3.5 rounded-2xl bg-[#00F0FF]/5 border border-[#00F0FF]/10">
                        <div class="w-10 h-10 rounded-full bg-[#00F0FF]/20 flex items-center justify-center shrink-0">
                          <i data-lucide="graduation-cap" class="w-5 h-5 text-[#00F0FF]"></i>
                        </div>
                        <div class="min-w-0">
                          <div class="font-bold text-white text-sm truncate">${p.nome || "Professor"}</div>
                          <div class="text-[10px] text-gray-500 truncate">${p.email || ""}</div>
                        </div>
                      </div>
                    `).join('') || '<p class="text-xs text-gray-500 italic ml-1">Nenhum professor regente.</p>'}
                  </div>
                </div>

                <div>
                  <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3 ml-1">Meus Colegas</h3>
                  <div class="space-y-2">
                    ${colegas.map(c => `
                      <div class="flex items-center gap-4 p-3 rounded-2xl bg-white/5 border border-white/5">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-gray-700 to-gray-800 flex items-center justify-center shrink-0">
                          <i data-lucide="user" class="w-5 h-5 text-gray-500"></i>
                        </div>
                        <span class="font-bold text-gray-200 text-sm">${c.nome || "Estudante"}</span>
                      </div>
                    `).join('')}
                  </div>
                </div>
              `;

              lucide.createIcons();
            });
          }
        }

        // 5. Contar Cartas no Codex
        const codexSnap = await getDocs(collection(db, "users", user.uid, "codex"));
        document.getElementById('count-cartas').textContent = codexSnap.size;

      } catch (e) {
        console.error("Erro ao carregar dashboard:", e);
      }
    });

    window.abrirModalTurma = () => {
      document.getElementById('modal-turma').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    };

    window.fecharModais = () => {
      document.getElementById('modal-turma').classList.add('hidden');
      document.body.style.overflow = '';
    };
  </script>
</body>

</html>
