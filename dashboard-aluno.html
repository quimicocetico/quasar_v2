<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Painel — Quasar</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="app.js"></script>
  <style>
    :root {
      --bg-deep: #0A0F1C;
      --glass: rgba(17, 24, 39, 0.7);
      --accent-cyan: #00F0FF;
    }
    body { background-color: var(--bg-deep); font-family: 'Outfit', sans-serif; color: white; min-height: 100vh; }
    .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
    .profile-glow { box-shadow: 0 0 30px rgba(0, 240, 255, 0.2); }
    .progress-bar { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #00F0FF, #7000FF); transition: width 0.5s ease-out; }
    
    /* Mobile-first adjustments */
    @media (max-width: 640px) {
      .container { padding: 1rem; }
    }
  </style>
</head>
<body class="pb-24 md:pb-12">

  <main class="max-w-xl mx-auto px-4 py-8 space-y-6">
    
    <!-- Perfil -->
    <header class="flex items-center gap-5 glass p-6 rounded-[2rem] profile-glow">
      <div class="relative">
        <div id="user-avatar" class="w-20 h-20 rounded-full bg-gradient-to-br from-[#00F0FF] to-[#7000FF] flex items-center justify-center text-4xl shadow-lg">
          <i data-lucide="user" class="w-10 h-10 text-white"></i>
        </div>
        <div class="absolute -bottom-1 -right-1 bg-green-500 w-5 h-5 rounded-full border-4 border-[#0A0F1C]"></div>
      </div>
      <div class="min-w-0">
        <h1 id="user-nome" class="text-xl font-black tracking-tight leading-none mb-1 truncate">Carregando...</h1>
        <div class="space-y-0.5">
          <p id="user-escola" class="text-gray-400 text-[10px] uppercase font-bold tracking-wider truncate">Escola...</p>
          <p id="user-turma" class="text-[#00F0FF] text-[10px] uppercase font-bold tracking-wider truncate">Turma...</p>
        </div>
      </div>
    </header>

    <!-- Minha Casa -->
    <section id="casa-section" class="hidden glass p-6 rounded-[2rem] border-t-4 border-t-white/10 overflow-hidden relative">
      <div class="absolute -right-4 -top-4 opacity-10">
        <i data-lucide="shield" class="w-32 h-32"></i>
      </div>
      <div class="relative z-10 flex justify-between items-center">
        <div>
          <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">Minha Casa</h2>
          <p id="casa-nome" class="text-3xl font-black italic tracking-tighter">...</p>
          <a href="/quasar-ferramentas/taca-das-casas/index.html" class="inline-flex items-center gap-1 mt-2 text-[10px] font-bold text-[#00F0FF] uppercase hover:underline">
            Ver Ranking Geral <i data-lucide="external-link" class="w-3 h-3"></i>
          </a>
        </div>
        <div class="text-right">
          <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">Pontos</p>
          <p id="casa-pontos" class="text-3xl font-black text-[#00F0FF]">0</p>
        </div>
      </div>
    </section>

    <!-- Minha Turma -->
    <button onclick="abrirModalTurma()" class="w-full glass p-6 rounded-[2rem] space-y-4 text-left hover:bg-white/10 transition-all">
      <div class="flex items-center justify-between">
        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Minha Turma</h3>
        <div class="flex items-center gap-2">
          <span id="contagem-colegas" class="text-[10px] bg-white/10 px-2 py-0.5 rounded-full text-gray-400">0 Alunos</span>
          <i data-lucide="chevron-right" class="w-4 h-4 text-gray-600"></i>
        </div>
      </div>
      <div id="lista-colegas-preview" class="flex -space-x-2 overflow-hidden">
        <!-- Avatares discretos -->
      </div>
    </button>

    <!-- Stats Discretas -->
    <div class="glass p-5 rounded-2xl flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-purple-500/10 rounded-lg flex items-center justify-center">
          <i data-lucide="layers" class="text-purple-400 w-4 h-4"></i>
        </div>
        <span class="text-sm font-bold text-gray-300">Coleção Codex</span>
      </div>
      <span id="count-cartas" class="text-lg font-black text-purple-400">0</span>
    </div>

    <!-- Links Rápidos -->
    <nav class="space-y-3">
        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-4 mb-2">Acesso Rápido</h3>
        <a href="/index.html" class="flex items-center justify-between glass p-5 rounded-2xl hover:bg-white/5 transition-all">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-[#00F0FF]/10 rounded-xl flex items-center justify-center">
              <i data-lucide="layout-grid" class="text-[#00F0FF] w-5 h-5"></i>
            </div>
            <span class="font-bold">Portal de Missões</span>
          </div>
          <i data-lucide="chevron-right" class="text-gray-600"></i>
        </a>
        <a href="/quasar-ferramentas/codex-arcano/index.html" class="flex items-center justify-between glass p-5 rounded-2xl hover:bg-white/5 transition-all">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-purple-500/10 rounded-xl flex items-center justify-center">
              <i data-lucide="book-open" class="text-purple-400 w-5 h-5"></i>
            </div>
            <span class="font-bold">Meu Codex</span>
          </div>
          <i data-lucide="chevron-right" class="text-gray-600"></i>
        </a>
        <a href="/quasar-ferramentas/taca-das-casas/index.html" class="flex items-center justify-between glass p-5 rounded-2xl hover:bg-white/5 transition-all">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-yellow-500/10 rounded-xl flex items-center justify-center">
              <i data-lucide="trophy" class="text-yellow-500 w-5 h-5"></i>
            </div>
            <span class="font-bold">Taça das Casas</span>
          </div>
          <i data-lucide="chevron-right" class="text-gray-600"></i>
        </a>
    </nav>

  </main>

  <!-- Modal Minha Turma -->
  <div id="modal-turma" class="fixed inset-0 z-[100] hidden flex items-end sm:items-center justify-center p-0 sm:p-4">
    <div class="absolute inset-0 bg-[#0A0F1C]/80 backdrop-blur-sm" onclick="fecharModais()"></div>
    <div class="relative w-full max-w-lg bg-[#111827] border-t sm:border border-white/10 rounded-t-[2rem] sm:rounded-[2rem] p-6 shadow-2xl animate-in slide-in-from-bottom duration-300">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-xl font-bold">Minha Turma</h2>
          <p id="modal-contagem" class="text-xs text-gray-500 font-medium">0 Alunos encontrados</p>
        </div>
        <button onclick="fecharModais()" class="p-2 hover:bg-white/5 rounded-full transition-all">
          <i data-lucide="x" class="w-6 h-6 text-gray-500"></i>
        </button>
      </div>
      
      <div id="modal-lista-colegas" class="space-y-2 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
        <!-- Lista injetada via JS -->
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth } from "./_shared/gatekeeper.js";
    import { auth } from "./firebase-config.js";
    import { db, doc, getDoc, collection, getDocs, query, where, onSnapshot } from "./_shared/db.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    requireAuth(async (user) => {
      // 1. Dados Básicos do Perfil
      document.getElementById('user-nome').textContent = user.displayName || "Explorador";
      lucide.createIcons();

      // 2. Buscar Dados no Firestore
      try {
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        
        if (userSnap.exists()) {
          const profile = userSnap.data();
          if (profile.nome) document.getElementById('user-nome').textContent = profile.nome;
          
          // Buscar nome da Escola e Turma
          if (profile.escola_id) {
            const escolaSnap = await getDoc(doc(db, "escolas", profile.escola_id));
            if (escolaSnap.exists()) document.getElementById('user-escola').textContent = escolaSnap.data().nome;
            
            const turmaSnap = await getDoc(doc(db, "escolas", profile.escola_id, "turmas", profile.turma_id));
            if (turmaSnap.exists()) document.getElementById('user-turma').textContent = turmaSnap.data().nome;
          }

          // 3. Buscar Dados da Casa se estiver matriculado
          if (profile.turma_id) {
            // Buscamos a casa vinculada a esta turma na temporada ativa (fixa temp_2024_1 para o MVP)
            const qCasa = query(
              collection(db, "taca_casas", "temp_2024_1", "casas"), 
              where("turma_id", "==", profile.turma_id)
            );
            
            onSnapshot(qCasa, (snap) => {
              if (!snap.empty) {
                const casaData = snap.docs[0].data();
                document.getElementById('casa-section').classList.remove('hidden');
                document.getElementById('casa-nome').textContent = casaData.nome;
                document.getElementById('casa-pontos').textContent = casaData.pontos_total || 0;
              }
            });

            // 4. Buscar Colegas de Turma
            const qColegas = query(
              collection(db, "matriculas"), 
              where("turma_id", "==", profile.turma_id)
            );
            
            onSnapshot(qColegas, (snap) => {
              const colegas = snap.docs.map(d => d.data());
              colegas.sort((a,b) => (a.nome || "").localeCompare(b.nome || ""));
              
              const countText = `${colegas.length} Alunos`;
              document.getElementById('contagem-colegas').textContent = countText;
              document.getElementById('modal-contagem').textContent = countText;

              // Preview no card (avatares)
              const preview = document.getElementById('lista-colegas-preview');
              preview.innerHTML = colegas.slice(0, 5).map(() => `
                <div class="w-8 h-8 rounded-full bg-gray-800 border-2 border-[#111827] flex items-center justify-center">
                  <i data-lucide="user" class="w-4 h-4 text-gray-600"></i>
                </div>
              `).join('');
              
              // Lista no Modal
              const modalLista = document.getElementById('modal-lista-colegas');
              modalLista.innerHTML = colegas.map(c => `
                <div class="flex items-center gap-4 p-3 rounded-2xl bg-white/5 border border-white/5">
                  <div class="w-10 h-10 rounded-full bg-gradient-to-br from-gray-700 to-gray-800 flex items-center justify-center shrink-0">
                    <i data-lucide="user" class="w-5 h-5 text-gray-500"></i>
                  </div>
                  <span class="font-bold text-gray-200 text-sm">${c.nome || "Estudante"}</span>
                </div>
              `).join('');

              lucide.createIcons();
            });
          }
        }

        // 5. Contar Cartas no Codex
        const codexSnap = await getDocs(collection(db, "users", user.uid, "codex"));
        document.getElementById('count-cartas').textContent = codexSnap.size;

      } catch (e) {
        console.error("Erro ao carregar dashboard:", e);
      }
    });

    window.abrirModalTurma = () => {
      document.getElementById('modal-turma').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    };

    window.fecharModais = () => {
      document.getElementById('modal-turma').classList.add('hidden');
      document.body.style.overflow = '';
    };
  </script>
</body>
</html>
