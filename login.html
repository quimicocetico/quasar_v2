<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso — Plataforma Quasar</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0A0F1C;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      font-family: 'Outfit', sans-serif;
    }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(80px);
      z-index: 0; opacity: 0.5; animation: float 10s infinite alternate ease-in-out;
      pointer-events: none;
    }
    .blob-1 { width: 400px; height: 400px; background: rgba(0,240,255,0.15); top: -100px; left: -100px; }
    .blob-2 { width: 300px; height: 300px; background: rgba(112,0,255,0.15); bottom: -50px; right: -50px; animation-delay: -5s; }
    @keyframes float {
      0%   { transform: translateY(0) scale(1); }
      100% { transform: translateY(20px) scale(1.05); }
    }
    .login-box {
      position: relative;
      z-index: 1;
      background: rgba(17,24,39,0.75);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 3rem 2.5rem;
      border-radius: 20px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .logo-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #00F0FF, #7000FF);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      box-shadow: 0 0 20px rgba(0,240,255,0.3);
    }
    h1 {
      font-weight: 800; font-size: 1.75rem; letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #00F0FF, #7000FF);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.5;
    }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 13px;
      background-color: white; color: #1e293b;
      border: none; border-radius: 10px;
      font-weight: 700; font-size: 0.95rem; font-family: 'Outfit', sans-serif;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-google:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,255,255,0.15); }
    .btn-google:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-google img { width: 20px; height: 20px; }
    #error-msg {
      color: #ef4444; font-size: 0.82rem; margin-top: 1rem;
      display: none; font-weight: 600;
      padding: 10px 12px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-box">
    <div class="logo-icon">
      <i data-lucide="layout-grid" style="color:white;width:24px;height:24px;"></i>
    </div>
    <h1>Quasar</h1>
    <p class="subtitle">Acesso restrito à rede de ensino<br>do Rio Grande do Norte.</p>

    <button id="btn-login" class="btn-google">
      <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
      Entrar com Google
    </button>

    <div id="error-msg"></div>
  </div>

  <script>
    // Renderiza o ícone do logo (Lucide já carregado no head)
    lucide.createIcons();
  </script>

  <script type="module">
    import { loginComGoogle } from '/firebase-config.js';

    document.getElementById('btn-login').addEventListener('click', async () => {
      const errorBox = document.getElementById('error-msg');
      const btn = document.getElementById('btn-login');
      try {
        errorBox.style.display = 'none';
        btn.textContent = 'Autenticando...';
        btn.disabled = true;
        await loginComGoogle();
        // Redirecionamento feito pelo app.js via onAuthStateChanged
      } catch (error) {
        errorBox.textContent = error.message;
        errorBox.style.display = 'block';
        btn.innerHTML = `<img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"> Tentar Novamente`;
        btn.disabled = false;
      }
    });
  </script>

  <!-- Gatekeeper (redireciona se já estiver logado) -->
  <script type="module" src="/app.js"></script>
</body>
</html>
