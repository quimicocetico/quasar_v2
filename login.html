<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso — Plataforma Quasar</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso — Plataforma Quasar</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
</head>
</head>

<body class="hero-bg min-h-screen flex items-center justify-center p-6 text-white font-['Outfit']">
  <div class="geo-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="glass-card max-w-md w-full p-12 text-center shadow-2xl animate-in fade-in zoom-in duration-500">
    <div class="w-20 h-20 bg-gradient-to-br from-cyan-500 to-emerald-500 rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-cyan-500/20 border-4 border-white/10">
      <i data-lucide="layout-grid" class="w-10 h-10 text-white"></i>
    </div>
    
    <h1 class="text-4xl font-black tracking-tighter uppercase mb-2">Quasar</h1>
    <p class="text-gray-400 font-medium leading-relaxed mb-10 opacity-70">Acesso restrito à rede de ensino<br>do Rio Grande do Norte.</p>

    <button id="btn-login" class="w-full flex items-center justify-center gap-4 py-4 bg-white text-gray-900 rounded-2xl font-black text-sm uppercase tracking-widest hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl shadow-white/5">
      <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" class="w-6 h-6">
      Entrar com Google
    </button>

    <div id="error-msg" class="mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-xs font-bold hidden animate-in slide-in-from-top-2"></div>
    
    <div class="mt-12 pt-8 border-t border-white/5">
      <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.2em]">Secretaria de Educação — RN</p>
    </div>
  </div>

  <script>
    // Renderiza o ícone do logo (Lucide já carregado no head)
    lucide.createIcons();
  </script>

  <script type="module">
    import { loginComGoogle } from '/firebase-config.js';

    document.getElementById('btn-login').addEventListener('click', async () => {
      const errorBox = document.getElementById('error-msg');
      const btn = document.getElementById('btn-login');
      try {
        errorBox.style.display = 'none';
        btn.textContent = 'Autenticando...';
        btn.disabled = true;
        await loginComGoogle();
        // Redirecionamento feito pelo app.js via onAuthStateChanged
      } catch (error) {
        errorBox.textContent = error.message;
        errorBox.style.display = 'block';
        btn.innerHTML = `<img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"> Tentar Novamente`;
        btn.disabled = false;
      }
    });
  </script>

  <!-- Gatekeeper (redireciona se já estiver logado) -->
  <script type="module" src="/app.js"></script>
</body>

</html>
