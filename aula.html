<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula — Plataforma Quasar</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body { background-color: #0A0F1C; color: white; font-family: 'Outfit', sans-serif; }
    .glass-sticky {
      background: rgba(10, 15, 28, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

  <!-- Espaço para o header injetado pelo app.js -->
  <div class="h-20"></div>

  <!-- Cabeçalho da aula -->
  <div class="sticky top-20 z-40 glass-sticky py-4">
    <div class="max-w-4xl mx-auto px-6">
      <h1 id="aula-titulo" class="text-2xl md:text-3xl font-bold text-white tracking-tight">Carregando...</h1>
      <p id="aula-subtitulo" class="text-cyan-400 text-xs font-mono uppercase tracking-widest mt-1"></p>
      <nav id="tabs-nav" class="flex gap-2 mt-6 overflow-x-auto pb-2 no-scrollbar"></nav>
    </div>
  </div>

  <!-- Conteúdo principal -->
  <main class="max-w-4xl mx-auto p-6 pb-20">
    <div id="tabs-content-container"></div>

    <!-- Aba de exercícios (oculta por padrão) -->
    <div id="tab-exercicios" class="hidden">
      <div class="bg-blue-500/10 p-4 rounded-xl border border-blue-500/20 mb-6 flex items-center gap-3 text-blue-400 text-sm">
        <i data-lucide="info" class="w-4 h-4 shrink-0"></i>
        <span>Responda as questões sorteadas para esta aula. Você só pode enviar uma vez.</span>
      </div>
      <div id="quiz-status-msg"></div>
      <form id="quiz-form" class="space-y-4"></form>
    </div>
  </main>

  <!-- Gatekeeper (último, obrigatório) -->
  <script type="module" src="/app.js"></script>

  <!-- Motor -->
  <script type="module">
    import { iniciarAula } from '/scripts/motor-de-aula.js';
    window.addEventListener('load', iniciarAula);
  </script>

</body>
</html>
