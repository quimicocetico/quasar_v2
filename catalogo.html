<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Título da Página — Plataforma Quasar</title>
 
  <!-- 1. Tailwind (síncrono, necessário para classes do header injetado) -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
 
  <!-- 2. Lucide Icons (DEVE vir antes do app.js) -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
 
  <!-- 3. Fonte Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main id="main-content">
        <div class="top-bar">
            <button id="btn-back" class="btn-acao">← Voltar ao Hub</button>
            <div id="breadcrumb">Catálogo</div>
        </div>

        <div class="catalog-container">
            <div class="catalog-header">
                <h1>Trilhas de Aprendizagem</h1>
                <p id="page-subtitle">Escolha uma disciplina para começar</p>
            </div>
            <div id="content-grid" class="grid-view"></div>
        </div>
    </main>

    <style>
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            animation: float 10s infinite alternate ease-in-out;
            pointer-events: none;
        }
        .blob-1 { width: 400px; height: 400px; background: rgba(0, 240, 255, 0.15); top: -100px; left: -100px; }
        .blob-2 { width: 300px; height: 300px; background: rgba(112, 0, 255, 0.15); bottom: -50px; right: -50px; animation-delay: -5s; }
        @keyframes float {
            0%   { transform: translateY(0) scale(1); }
            100% { transform: translateY(20px) scale(1.05); }
        }

        #main-content {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.25rem 4rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .btn-acao {
            color: #00F0FF;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
            padding: 0;
        }
        .btn-acao:hover { opacity: 0.7; }

        #breadcrumb {
            color: #475569;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .catalog-container {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 2rem;
        }

        .catalog-header {
            margin-bottom: 1.75rem;
        }

        .catalog-header h1 {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 800;
            background: linear-gradient(90deg, #00F0FF, #7000FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
        }

        .catalog-header p {
            color: #64748b;
            font-size: 0.95rem;
        }

        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
        }

        /* Cards */
        .card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 1.5rem;
            text-align: center;
            color: white;
            transition: all 0.25s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 140px;
        }

        .card:hover {
            border-color: rgba(0, 240, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 12px rgba(0, 240, 255, 0.04);
        }

        .card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
            border-color: transparent !important;
        }

        .card-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .card-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 0.4rem; }
        .card-subtitle { font-size: 0.8rem; color: #64748b; }

        /* Card de aula */
        .card-aula {
            align-items: flex-start;
            text-align: left;
        }
        .card-aula .badge {
            color: #00F0FF;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .card-aula .card-title {
            flex-grow: 1;
            margin-bottom: 0.75rem;
        }
        .card-aula .status {
            font-size: 0.8rem;
            color: #00F0FF;
            font-weight: 600;
        }
        .card-aula.disabled .status { color: #475569; }

        /* Estado vazio */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: #475569;
            padding: 2rem;
            font-size: 0.95rem;
        }

        /* Erro */
        .error-state {
            grid-column: 1 / -1;
            text-align: center;
            color: #ef4444;
            padding: 2rem;
            font-size: 0.9rem;
            background: rgba(239, 68, 68, 0.08);
            border-radius: 10px;
        }

        @media (max-width: 640px) {
            .top-bar { flex-direction: column; align-items: flex-start; gap: 8px; }
            .blob { opacity: 0.2; }
        }
    </style>

    <script>
        let DB_CATALOGO = {};
        let currentStep = 'disciplinas';
        let selectedDisciplina = null;
        let selectedTurma = null;

        const contentGrid = document.getElementById('content-grid');
        const breadcrumb  = document.getElementById('breadcrumb');
        const btnBack     = document.getElementById('btn-back');
        const pageSubtitle = document.getElementById('page-subtitle');

        async function carregarCatalogo() {
            try {
                const response = await fetch('./catalogo.json');
                DB_CATALOGO = await response.json();
                renderView();
            } catch (err) {
                console.error('Erro ao carregar catálogo:', err);
                contentGrid.innerHTML = `<div class="error-state">Erro ao carregar aulas. Verifique se <code>catalogo.json</code> foi gerado pelo robô.</div>`;
            }
        }

        function renderView() {
            contentGrid.innerHTML = '';

            if (currentStep === 'disciplinas') {
                pageSubtitle.textContent = 'Escolha uma disciplina para começar';
                breadcrumb.textContent = 'Catálogo';
                btnBack.textContent = '← Voltar ao Hub';
                btnBack.onclick = () => window.location.href = './index.html';

                for (const [key, data] of Object.entries(DB_CATALOGO)) {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="card-icon">${data.icone}</div>
                        <h2 class="card-title">${data.nome}</h2>
                        <p class="card-subtitle">Explorar Trilhas →</p>
                    `;
                    div.onclick = () => selectDisciplina(key);
                    contentGrid.appendChild(div);
                }
            }

            else if (currentStep === 'turmas') {
                const disc = DB_CATALOGO[selectedDisciplina];
                pageSubtitle.textContent = 'Selecione o ano / série';
                breadcrumb.textContent = `Catálogo › ${disc.nome}`;
                btnBack.textContent = '← Disciplinas';
                btnBack.onclick = () => { currentStep = 'disciplinas'; renderView(); };

                const turmas = Object.entries(disc.turmas);
                if (turmas.length === 0) {
                    contentGrid.innerHTML = '<div class="empty-state">Nenhuma turma cadastrada ainda.</div>';
                    return;
                }
                turmas.forEach(([key, data]) => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="card-icon">🎓</div>
                        <h2 class="card-title">${data.nome}</h2>
                        <p class="card-subtitle">${data.aulas.length} aula(s) disponíveis</p>
                    `;
                    div.onclick = () => selectTurma(key);
                    contentGrid.appendChild(div);
                });
            }

            else if (currentStep === 'aulas') {
                const disc  = DB_CATALOGO[selectedDisciplina];
                const turma = disc.turmas[selectedTurma];
                pageSubtitle.textContent = 'Escolha a sua missão';
                breadcrumb.textContent = `Catálogo › ${disc.nome} › ${turma.nome}`;
                btnBack.textContent = '← Turmas';
                btnBack.onclick = () => { currentStep = 'turmas'; renderView(); };

                turma.aulas.forEach(aula => {
                    const div = document.createElement('div');
                    div.className = aula.ativo ? 'card card-aula' : 'card card-aula disabled';
                    div.innerHTML = `
                        <span class="badge">${aula.escola}</span>
                        <h3 class="card-title">${aula.titulo}</h3>
                        <span class="status">${aula.ativo ? 'Acessar Aula →' : 'Em breve 🔒'}</span>
                    `;
                    if (aula.ativo) div.onclick = () => window.location.href = aula.link;
                    contentGrid.appendChild(div);
                });
            }
        }

        function selectDisciplina(key) { selectedDisciplina = key; currentStep = 'turmas'; renderView(); }
        function selectTurma(key)      { selectedTurma = key;      currentStep = 'aulas';  renderView(); }

        carregarCatalogo();
    </script>

    <!-- Gatekeeper — sempre o último script -->
    <script type="module" src="/app.js"></script>
</body>
</html>
