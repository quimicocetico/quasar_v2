<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Aulas — Plataforma Quasar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Bolhas de Fundo */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite alternate ease-in-out;
        }
        .blob-1 { width: 400px; height: 400px; background: rgba(0, 240, 255, 0.15); top: -100px; left: -100px; }
        .blob-2 { width: 300px; height: 300px; background: rgba(112, 0, 255, 0.15); bottom: -50px; right: -50px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(20px) scale(1.05); }
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            z-index: 10;
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00F0FF, #7000FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle { color: #94a3b8; font-size: 1.1rem; }

        .top-bar {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        .btn-acao {
            color: #00F0FF;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1rem;
            transition: opacity 0.3s ease;
        }
        .btn-acao:hover { opacity: 0.7; }

        #breadcrumb {
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Container do Catálogo */
        .catalog-container {
            width: 100%;
            max-width: 900px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            z-index: 10;
        }

        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Cards Genéricos (Disciplinas, Turmas, Aulas) */
        .card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 150px;
        }

        .card:hover {
            border-color: rgba(0, 240, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: transparent;
            transform: none;
            box-shadow: none;
        }

        .card-icon { font-size: 3rem; margin-bottom: 15px; }
        .card-title { font-weight: 600; font-size: 1.2rem; margin-bottom: 10px; }
        .card-subtitle { font-size: 0.85rem; color: #94a3b8; }

        /* Estilo específico para card de aula */
        .card-aula { align-items: flex-start; text-align: left; }
        .card-aula .badge { color: #00F0FF; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .card-aula .status { margin-top: 15px; font-size: 0.85rem; color: #00F0FF; font-weight: 600; }
        .card-aula.disabled .status { color: #94a3b8; }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .top-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <header>
        <h1>Trilhas de Aprendizagem</h1>
        <p class="subtitle" id="page-subtitle">Escolha uma disciplina para começar</p>
    </header>

    <div class="top-bar">
        <button id="btn-back" class="btn-acao" onclick="goBack()">← Voltar ao Hub</button>
        <div id="breadcrumb">Catálogo</div>
    </div>

    <div class="catalog-container">
        <div id="content-grid" class="grid-view">
            </div>
    </div>

    <script>
        // Variáveis de Estado
        let DB_CATALOGO = {};
        let currentStep = 'disciplinas'; 
        let selectedDisciplina = null;
        let selectedTurma = null;

        const contentGrid = document.getElementById('content-grid');
        const breadcrumb = document.getElementById('breadcrumb');
        const btnBack = document.getElementById('btn-back');
        const pageSubtitle = document.getElementById('page-subtitle');

        // Função para carregar o JSON gerado pelo nosso robô (Node.js)
        async function carregarCatalogo() {
            try {
                const response = await fetch('./catalogo.json');
                DB_CATALOGO = await response.json();
                renderView(); // Só desenha a tela depois de carregar os dados!
            } catch (error) {
                console.error("Erro ao carregar o catálogo:", error);
                contentGrid.innerHTML = `<p style="color: #ef4444; text-align: center; grid-column: 1/-1;">Erro ao carregar aulas. Verifique se o arquivo catalogo.json foi gerado.</p>`;
            }
        }

        // Função de Renderização Principal (Mesma de antes!)
        function renderView() {
            contentGrid.innerHTML = ''; 

            if (currentStep === 'disciplinas') {
                pageSubtitle.textContent = "Escolha uma disciplina para começar";
                breadcrumb.textContent = "Catálogo";
                btnBack.innerHTML = "← Voltar ao Hub";
                btnBack.onclick = () => window.location.href = './index.html';

                for (const [key, data] of Object.entries(DB_CATALOGO)) {
                    contentGrid.innerHTML += `
                        <div class="card" onclick="selectDisciplina('${key}')">
                            <div class="card-icon">${data.icone}</div>
                            <h2 class="card-title">${data.nome}</h2>
                            <p class="card-subtitle">Explorar Trilhas →</p>
                        </div>
                    `;
                }
            } 
            else if (currentStep === 'turmas') {
                const discData = DB_CATALOGO[selectedDisciplina];
                pageSubtitle.textContent = "Selecione o ano/série";
                breadcrumb.textContent = `Catálogo > ${discData.nome}`;
                btnBack.innerHTML = "← Voltar para Disciplinas";
                btnBack.onclick = () => { currentStep = 'disciplinas'; renderView(); };

                const turmas = discData.turmas;
                if (Object.keys(turmas).length === 0) {
                    contentGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #94a3b8;">Nenhuma turma cadastrada ainda.</p>`;
                } else {
                    for (const [key, data] of Object.entries(turmas)) {
                        contentGrid.innerHTML += `
                            <div class="card" onclick="selectTurma('${key}')">
                                <div class="card-icon">🎓</div>
                                <h2 class="card-title">${data.nome}</h2>
                                <p class="card-subtitle">${data.aulas.length} aula(s) disponíveis</p>
                            </div>
                        `;
                    }
                }
            } 
            else if (currentStep === 'aulas') {
                const discData = DB_CATALOGO[selectedDisciplina];
                const turmaData = discData.turmas[selectedTurma];
                
                pageSubtitle.textContent = "Escolha a sua missão";
                breadcrumb.textContent = `Catálogo > ${discData.nome} > ${turmaData.nome}`;
                btnBack.innerHTML = "← Voltar para Turmas";
                btnBack.onclick = () => { currentStep = 'turmas'; renderView(); };

                turmaData.aulas.forEach(aula => {
                    const statusText = aula.ativo ? "Acessar Aula →" : "Em breve 🔒";
                    const cssClass = aula.ativo ? "card card-aula" : "card card-aula disabled";
                    const clickAction = aula.ativo ? `window.location.href='${aula.link}'` : "";

                    contentGrid.innerHTML += `
                        <div class="${cssClass}" onclick="${clickAction}">
                            <span class="badge">${aula.escola}</span>
                            <h3 class="card-title" style="margin-bottom: auto;">${aula.titulo}</h3>
                            <span class="status">${statusText}</span>
                        </div>
                    `;
                });
            }
        }

        // Funções de Ação
        function selectDisciplina(key) {
            selectedDisciplina = key;
            currentStep = 'turmas';
            renderView();
        }

        function selectTurma(key) {
            selectedTurma = key;
            currentStep = 'aulas';
            renderView();
        }

        // Dá a partida inicial na aplicação
        carregarCatalogo();
    </script>
</body>
</html>
