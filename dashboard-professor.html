<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard do Professor — Quasar</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    .glass { background: rgba(17,24,39,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
    .btn-action { transition: all 0.2s; }
    .btn-action:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,240,255,0.2); }
    
    /* Correção do contraste nas opções do select */
    select option { background-color: #1a1b3a; color: white; }
    select option:hover { background-color: #00F0FF; color: #0A0F1C; }
  </style>
</head>
<body class="bg-[#0A0F1C] text-white font-['Outfit'] min-h-screen">

  <main class="max-w-5xl mx-auto px-4 py-8 md:py-12">
    <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-6 mb-10">
      <div class="text-center md:text-left">
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-[#00F0FF] to-[#7000FF]">Painel do Mestre</h1>
        <p class="text-gray-400 mt-2 text-sm md:text-base">Gerencie suas escolas e turmas do Quasar.</p>
      </div>
      <a href="/index.html" class="flex items-center justify-center gap-2 px-6 py-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 transition-all w-full md:w-auto">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        <span class="font-bold">Voltar ao Hub</span>
      </a>
    </div>

    <div id="loading-state" class="flex justify-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#00F0FF]"></div>
    </div>

    <div id="dashboard-content" class="hidden space-y-8">
      <!-- Escolas serão injetadas aqui -->
    </div>

    <div id="empty-state" class="hidden text-center py-20 glass rounded-3xl">
      <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-4">
        <i data-lucide="school" class="w-8 h-8 text-gray-500"></i>
      </div>
      <h3 class="text-xl font-bold">Nenhuma escola encontrada</h3>
      <p class="text-gray-400 mt-2 mb-6">Você ainda não está vinculado a nenhuma instituição.</p>
      <a href="/onboarding.html" class="px-6 py-3 bg-[#00F0FF] text-[#0A0F1C] font-bold rounded-xl btn-action inline-block">
        Configurar Escola
      </a>
    </div>
  </main>

  <!-- Modal Nova Turma -->
  <div id="modal-turma" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm hidden">
    <div class="max-w-md w-full glass rounded-3xl p-8 shadow-2xl">
      <h2 class="text-2xl font-bold mb-2">Nova Turma</h2>
      <p class="text-gray-400 mb-6" id="modal-escola-nome">Escola...</p>
      
      <div class="space-y-4">
          <div class="space-y-4">
            <div>
              <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Nome da Turma</label>
              <input type="text" id="nova-turma-nome" class="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-3 focus:border-[#00F0FF] outline-none transition-all placeholder:text-gray-600" placeholder="Ex: 1º Ano A">
            </div>
            <div>
              <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Série / Ano</label>
              <select id="nova-turma-serie" class="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-3 focus:border-[#00F0FF] outline-none transition-all appearance-none text-white">
                <option value="1">1º Ano</option>
                <option value="2">2º Ano</option>
                <option value="3">3º Ano</option>
              </select>
            </div>
          </div>
        <div class="flex gap-3">
          <button onclick="fecharModal()" class="flex-1 py-3 bg-white/5 hover:bg-white/10 rounded-xl font-medium transition-all">Cancelar</button>
          <button id="btn-save-turma" class="flex-1 py-3 bg-[#00F0FF] text-[#0A0F1C] font-bold rounded-xl btn-action">Criar Turma</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Compartilhar -->
  <div id="modal-share" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onclick="window.fecharModalShare()">
    <div class="glass max-w-sm w-full p-8 rounded-[2.5rem] text-center space-y-6 animate-in zoom-in duration-300" onclick="event.stopPropagation()">
      <div class="w-16 h-16 bg-[#00F0FF]/10 rounded-2xl flex items-center justify-center mx-auto">
        <i data-lucide="qr-code" class="w-8 h-8 text-[#00F0FF]"></i>
      </div>
      <div>
        <h2 class="text-xl font-bold">Ranking Público</h2>
        <p class="text-gray-400 text-xs px-4">Compartilhe este link para que qualquer pessoa acompanhe o ranking sem login.</p>
      </div>
      
      <div class="bg-white p-3 rounded-2xl inline-block mx-auto shadow-2xl shadow-[#00F0FF]/20">
        <img id="qrcode-img" src="" alt="QR Code" class="w-48 h-48">
      </div>

      <div class="space-y-3">
        <button id="btn-copy-link" class="w-full py-3 bg-[#00F0FF] text-[#0A0F1C] font-bold rounded-xl flex items-center justify-center gap-2 hover:scale-[1.02] transition-all">
          <i data-lucide="copy" class="w-4 h-4"></i> Copiar Link
        </button>
        <button onclick="window.fecharModalShare()" class="w-full py-3 bg-white/5 rounded-xl font-medium text-gray-400 hover:text-white transition-all text-sm">
          Fechar
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
  <script type="module">
    import { requireAuth } from "./_shared/gatekeeper.js";
    import { db, doc, getDoc, collection, getDocs, addDoc, query, where, serverTimestamp, getCountFromServer } from "./_shared/db.js";
    import { abrirModalPontos } from "./_shared/points-helper.js";

    let activeEscolaId = null;

    requireAuth(async (user) => {
      const userSnap = await getDoc(doc(db, "users", user.uid));
      const profile = userSnap.data();
      await carregarDashboard(user, profile);

      // Configurar botão de salvar turma dentro do contexto do usuário
      document.getElementById('btn-save-turma').onclick = async () => {
        const nome = document.getElementById('nova-turma-nome').value.trim();
        if (!nome) return alert("Informe o nome da turma.");

        const btn = document.getElementById('btn-save-turma');
        btn.disabled = true;
        btn.textContent = "Criando...";

        try {
          const serie = parseInt(document.getElementById('nova-turma-serie').value);
          // 1. Prevenir duplicidade na mesma escola
          const qCheck = query(collection(db, "escolas", activeEscolaId, "turmas"), where("nome", "==", nome));
          const snapCheck = await getDocs(qCheck);
          
          if (!snapCheck.empty) {
            alert("Uma turma com este nome já existe nesta escola!");
            btn.disabled = false;
            btn.textContent = "Criar Turma";
            return;
          }

          // 2. Criar Documento
          await addDoc(collection(db, "escolas", activeEscolaId, "turmas"), {
            nome: nome,
            serie: serie,
            escola_id: activeEscolaId,
            professor_uid: auth.currentUser.uid,
            timestamp: serverTimestamp()
          });

          fecharModal();
          location.reload();
        } catch (e) {
          console.error(e);
          alert("Erro ao criar turma.");
          btn.disabled = false;
          btn.textContent = "Criar Turma";
        }
      };
    });

    async function carregarDashboard(user, profile) {
      const dashboard = document.getElementById('dashboard-content');
      const loading = document.getElementById('loading-state');
      const empty = document.getElementById('empty-state');

      try {
        // 1. Buscar escolas onde é dono
        const qEscolasOwner = query(collection(db, "escolas"), where("professor_uid", "==", user.uid));
        const snapEscolas = await getDocs(qEscolasOwner);
        
        let escolasIds = snapEscolas.docs.map(d => d.id);
        
        // 2. Incluir escola do perfil (vinculada em onboarding)
        if (profile?.escola_id && !escolasIds.includes(profile.escola_id)) {
          escolasIds.push(profile.escola_id);
        }

        if (escolasIds.length === 0) {
          loading.classList.add('hidden');
          empty.classList.remove('hidden');
          return;
        }

        dashboard.innerHTML = '';
        for (const escolaId of escolasIds) {
          const escolaDoc = await getDoc(doc(db, "escolas", escolaId));
          if (!escolaDoc.exists()) continue;

          const escola = { id: escolaDoc.id, ...escolaDoc.data() };
          const qTurmas = query(collection(db, "escolas", escola.id, "turmas"), where("professor_uid", "==", user.uid));
          const snapTurmas = await getDocs(qTurmas);
          
          const turmasComContagem = await Promise.all(snapTurmas.docs.map(async d => {
            const t = { id: d.id, ...d.data() };
            // Contagem dinâmica de matrículas nesta turma
            const qCount = query(collection(db, "matriculas"), where("turma_id", "==", t.id), where("escola_id", "==", escola.id));
            const countSnap = await getCountFromServer(qCount);
            t.alunoCount = countSnap.data().count;
            return t;
          }));

          // Ordenar por série (1, 2, 3)
          turmasComContagem.sort((a, b) => (a.serie || 0) - (b.serie || 0));

          dashboard.appendChild(renderizarEscola(escola, turmasComContagem));
        }

        loading.classList.add('hidden');
        dashboard.classList.remove('hidden');
        lucide.createIcons();
      } catch (e) {
        console.error(e);
      }
    }

    function renderizarEscola(escola, turmas) {
      const div = document.createElement('div');
      div.className = 'glass rounded-3xl p-4 md:p-8';
      div.innerHTML = `
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
          <div>
            <h2 class="text-xl md:text-2xl font-bold">${escola.nome}</h2>
            <p class="text-gray-500 text-xs md:text-sm">ID: ${escola.id}</p>
          </div>
          <div class="flex items-center gap-2 w-full md:w-auto">
            <button onclick="window.abrirModalShare('${escola.id}')" class="flex-1 md:flex-none p-3 bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded-xl hover:bg-blue-500/20 transition-all text-sm font-bold" title="Compartilhar Ranking Público">
              <i data-lucide="share-2" class="w-5 h-5 md:w-4 md:h-4"></i>
            </button>
            <button onclick="window.abrirModal('${escola.id}', '${escola.nome}')" class="flex-[3] md:flex-none flex items-center justify-center gap-2 px-6 py-3 bg-[#00F0FF]/10 text-[#00F0FF] border border-[#00F0FF]/20 rounded-xl hover:bg-[#00F0FF]/20 transition-all text-sm font-bold">
              <i data-lucide="plus" class="w-4 h-4"></i>
              Nova Turma
            </button>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4">
          ${turmas.map(t => `
            <div class="p-5 bg-white/5 border border-white/5 rounded-2xl flex items-center justify-between group hover:bg-white/10 transition-all">
              <div>
                <div class="font-bold text-lg md:text-base">${t.nome}</div>
                <div class="text-xs text-gray-500 uppercase tracking-wider font-semibold">${t.alunoCount || 0} Alunos</div>
              </div>
              <div class="flex items-center gap-2">
                <button onclick="window.abrirModalPontos('${t.id}', '${escola.id}', '${t.nome}')" class="p-3 bg-yellow-500/10 text-yellow-500 rounded-xl hover:bg-yellow-500/20 transition-all border border-yellow-500/20">
                  <i data-lucide="trophy" class="w-5 h-5 md:w-4 md:h-4"></i>
                </button>
                <a href="/gerenciar-turma.html?escola=${escola.id}&turma=${t.id}" class="p-3 bg-white/5 border border-white/5 hover:bg-white/10 rounded-xl text-gray-400 md:hover:text-white transition-all">
                  <i data-lucide="settings" class="w-5 h-5 md:w-4 md:h-4"></i>
                </a>
              </div>
            </div>
          `).join('') || '<p class="text-gray-500 italic col-span-full py-4 text-center">Nenhuma turma cadastrada nesta escola.</p>'}
        </div>
      `;
      return div;
    }

    window.abrirModalPontos = abrirModalPontos;

    window.abrirModal = (id, nome) => {
      activeEscolaId = id;
      document.getElementById('modal-escola-nome').textContent = nome;
      document.getElementById('modal-turma').classList.remove('hidden');
      document.getElementById('nova-turma-nome').focus();
    };

    window.fecharModal = () => {
      document.getElementById('modal-turma').classList.add('hidden');
      document.getElementById('nova-turma-nome').value = '';
    };

    // Funções de Compartilhamento
    let publicLink = "";

    window.abrirModalShare = (escolaId) => {
      publicLink = `${window.location.origin}/quasar-ferramentas/taca-das-casas/publico.html?escola=${escolaId}`;
      const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(publicLink)}`;
      
      document.getElementById('qrcode-img').src = qrApi;
      document.getElementById('modal-share').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      if (window.lucide) lucide.createIcons();
    };

    window.fecharModalShare = () => {
      document.getElementById('modal-share').classList.add('hidden');
      document.body.style.overflow = '';
    };

    document.getElementById('btn-copy-link').onclick = () => {
      navigator.clipboard.writeText(publicLink).then(() => {
        const btn = document.getElementById('btn-copy-link');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> Copiado!';
        if (window.lucide) lucide.createIcons();
        setTimeout(() => {
          btn.innerHTML = originalText;
          if (window.lucide) lucide.createIcons();
        }, 2000);
      });
    };
  </script>
</body>
</html>
